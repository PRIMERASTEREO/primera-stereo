<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMERA STEREO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- MENÚ OVERLAY (ESTILO FLOTANTE) --- */
        #menu-toggle { display: none; }
        .menu-btn {
            position: fixed; top: 15px; left: 15px; z-index: 10001;
            cursor: pointer; background: #6644ff; color: #fff;
            width: 40px; height: 40px; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        .sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: rgba(10, 10, 10, 0.98); border-right: 2px solid #330066;
            transition: 0.3s ease; z-index: 10000; padding: 65px 15px 15px;
            display: flex; flex-direction: column; gap: 4px;
        }
        #menu-toggle:checked ~ .sidebar { left: 0; }
        
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 9999;
        }
        #menu-toggle:checked ~ .menu-overlay { display: block; }

        .btn-social {
            background: #151515; color: #fff; padding: 8px 12px;
            border-radius: 6px; text-decoration: none; display: flex; 
            align-items: center; font-size: 0.85rem; border: 1px solid #222;
        }
        .btn-social i { width: 25px; margin-right: 10px; text-align: center; font-size: 1.1rem; }

        /* COLORES RRSS */
        .fa-instagram { color: #E1306C; }
        .fa-facebook { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }
        .fa-telegram { color: #0088CC; }
        .fa-tiktok { color: #fff; }
        .fa-soundcloud { color: #FF5500; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #fff; }
        .fa-threads { color: #fff; }
        .fa-download { color: #00ff00; }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        #player-container {
            width: 320px; height: 320px; background: #0a0a0a;
            border-radius: 20px; position: relative; overflow: hidden;
            border: 2px solid #330066; box-shadow: 0 0 25px rgba(102, 68, 255, 0.3);
            margin: 15px 0;
        }
        #yt-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #cover-art { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; object-fit: cover; }

        .info { margin-bottom: 20px; }
        #artist { font-size: 1.6rem; font-weight: bold; color: #ffff00; display: block; }
        #song { font-size: 1.1rem; color: #6644ff; }

        .play-btn { 
            background: #6644ff; border: none; width: 65px; height: 65px; 
            border-radius: 50%; color: #fff; font-size: 1.6rem; cursor: pointer;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .volume-slider { width: 180px; accent-color: #ffff00; margin-bottom: 20px; }

        .ad-section { width: 320px; border-top: 1px solid #222; padding-top: 15px; }
        #ad-link img { width: 100%; max-height: 70px; object-fit: contain; }

        .copy-footer { font-size: 0.65rem; color: #444; margin-top: 15px; letter-spacing: 1px; }

        @media (max-width: 400px) {
            #player-container { width: 280px; height: 280px; }
        }
    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></label>
    <div class="menu-overlay" onclick="document.getElementById('menu-toggle').checked=false"></div>

    <div class="sidebar">
        <h3 style="color:#ffff00; font-size:1rem; text-align:center; margin-bottom:10px;">SÍGUENOS</h3>
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social"><i class="fab fa-facebook"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social"><i class="fab fa-whatsapp"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social"><i class="fab fa-telegram"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://soundcloud.com/primerastereo" target="_blank" class="btn-social"><i class="fab fa-soundcloud"></i> Soundcloud</a>
        <a href="https://www.youtube.com/@primerastereo" target="_blank" class="btn-social"><i class="fab fa-youtube"></i> Youtube</a>
        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social"><i class="fab fa-x-twitter"></i> Twitter / X</a>
        <a href="https://www.threads.net/@primera.stereo" target="_blank" class="btn-social"><i class="fa-brands fa-threads"></i> Threads</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social"><i class="fas fa-download"></i> Descargar App</a>
    </div>

    <div class="main-content">
        <h1 style="color:#ffff00; font-size: 1.8rem; line-height: 1;">PRIMERA STEREO</h1>
        <p style="font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 5px;">RADIO VIDEO ONLINE</p>

        <div id="player-container">
            <div id="yt-player"></div>
            <img id="cover-art" src="https://primerastereo.netlify.app/favicon.png">
        </div>

        <div class="info">
            <span id="artist">Cargando...</span>
            <span id="song">Espere un momento</span>
        </div>

        <button id="play-pause" class="play-btn"><i class="fas fa-play"></i></button>
        <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.01" value="0.8">

        <div class="ad-section">
            <a id="ad-link" href="#" target="_blank"><img id="ad-banner" src=""></a>
        </div>

        <p class="copy-footer">© 2010 - 2026 PRIMERA STEREO</p>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const audio = new Audio("https://primerastereo.stream.laut.fm/primerastereo");
        const playBtn = document.getElementById('play-pause');
        const artImg = document.getElementById('cover-art');
        let ytPlayer, currentTrack = "";

        const banners = [
            { img: "https://primerastereo.netlify.app/Anuncie%20aquí.jpg", link: "https://api.whatsapp.com/send?phone=+584127097429" },
            { img: "https://primerastereo.netlify.app/Alvacom%20Systems.jpg", link: "https://www.facebook.com/AlvacomSystems" },
            { img: "https://primerastereo.netlify.app/KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" }
        ];
        let bIdx = 0;

        playBtn.onclick = () => {
            if (audio.paused) { 
                audio.play(); 
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                if(ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
            } else { 
                audio.pause(); 
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
            }
        };

        document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': (e) => {
                    artImg.style.display = (e.data == YT.PlayerState.PLAYING) ? "none" : "block";
                }}
            });
        }

        async function updateRadio() {
            try {
                const res = await fetch("https://api.laut.fm/station/primerastereo/current_song");
                const data = await res.json();
                const track = `${data.artist.name} - ${data.title}`;

                if (track !== currentTrack) {
                    currentTrack = track;
                    document.getElementById('artist').innerText = data.artist.name;
                    document.getElementById('song').innerText = data.title;
                    
                    // Actualizar carátula
                    artImg.src = data.image_huge || "https://primerastereo.netlify.app/favicon.png";
                    artImg.style.display = "block";

                    // Búsqueda de Video
                    fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=` + encodeURIComponent(track))
                        .then(r => r.json()).then(v => {
                            if(v.video_id && ytPlayer) {
                                ytPlayer.loadVideoById(v.video_id);
                                ytPlayer.mute();
                            }
                        }).catch(() => {});
                }
                
                // Rotar banner
                document.getElementById('ad-banner').src = banners[bIdx].img;
                document.getElementById('ad-link').href = banners[bIdx].link;
                bIdx = (bIdx + 1) % banners.length;
            } catch (e) {}
        }

        setInterval(updateRadio, 15000);
        updateRadio();
    </script>
</body>
</html>
