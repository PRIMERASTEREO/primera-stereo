<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMERA STEREO RADIO VIDEO ONLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    
    <style>
        :root { --primary-color: #6c5ce7; --bg-dark: #000000; --accent: #FFFF00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        .bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); z-index: -2; transition: 2s; }
        .bg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)); z-index: -1; }
        
        /* Menú Lateral */
        #menu-toggle { display: none; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1100; cursor: pointer; color: white; font-size: 22px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(10, 10, 10, 0.98); transition: 0.4s; z-index: 1050; padding: 20px; border-right: 2px solid var(--primary-color); overflow-y: auto; }
        #menu-toggle:checked ~ .side-menu { left: 0; }
        
        /* Overlay para cerrar menú */
        .menu-close-overlay { position: fixed; top:0; left:0; width:100%; height:100%; display:none; z-index: 1040; }
        #menu-toggle:checked ~ .menu-close-overlay { display: block; }

        .btn-social { display: flex; align-items: center; padding: 8px 15px; margin-bottom: 5px; border-radius: 8px; text-decoration: none; color: white; font-size: 0.9rem; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-social i { margin-right: 12px; width: 22px; text-align: center; font-size: 1.1rem; }
        
        /* Colores de Redes Sociales */
        .instagram i { color: #E1306C; }
        .facebook i  { color: #1877F2; }
        .whatsapp i  { color: #25D366; }
        .telegram i  { color: #0088CC; }
        .tiktok i    { color: #fff; }
        .soundcloud i { color: #FF5500; }
        .youtube i   { color: #FF0000; }
        .x-twitter i { color: #fff; }
        .threads i   { color: #fff; }
        .app-store i { color: #00ff00; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; padding-top: 20px; }
        .main-title { color: var(--accent); font-size: 1.4rem; letter-spacing: 2px; line-height: 1; }
        .sub-title { letter-spacing: 4px; font-size: 0.7rem; margin-bottom: 15px; text-transform: uppercase; color: #aaa; }
        
        /* Caja del Reproductor */
        .logo-container { 
            width: 300px; height: 300px; 
            border-radius: 20px; /* Bordes redondeados para evitar el rectángulo rígido */
            overflow: hidden; position: relative; 
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.3); 
            background: #111; border: 2px solid #222;
        }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #yt-player { width: 100%; height: 100%; transform: scale(1.5); pointer-events: none; opacity: 0; transition: 1s; }
        #album-art { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; transition: 1.5s; }

        @keyframes pulse-extra {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.04); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .animar-logo { animation: pulse-extra 2s infinite ease-in-out; }

        /* Marquesina integrada en la caja */
        .track-info { 
            width: 300px; background: rgba(0,0,0,0.6); 
            padding: 10px; margin-top: -50px; z-index: 5; 
            border-radius: 0 0 20px 20px; backdrop-filter: blur(5px);
            overflow: hidden; white-space: nowrap;
        }
        .marquee-content { display: inline-block; animation: marquee 12s linear infinite; }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        #artist-name { font-size: 0.9rem; font-weight: 600; color: var(--accent); display: inline; }
        #song-title { color: white; font-size: 0.9rem; display: inline; margin-left: 15px; }

        /* Footer y Banners */
        footer { padding: 10px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.5); }
        .controls { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .play-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--primary-color); border: none; color: white; cursor: pointer; font-size: 1.2rem; }
        #volume-slider { width: 150px; accent-color: var(--accent); }

        .ad-section { width: 300px; text-align: center; margin-top: 5px; }
        .ad-label { color: var(--accent); font-size: 0.65rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        #ad-link img { width: 100%; max-height: 60px; object-fit: contain; border-radius: 5px; }

        .copy { font-size: 0.55rem; opacity: 0.5; margin-top: 8px; }

        @media (max-height: 700px) {
            .logo-container { width: 250px; height: 250px; }
            .track-info { width: 250px; }
            .main-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>
    <div class="bg-overlay"></div>
    
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></label>
    <div class="menu-close-overlay" onclick="document.getElementById('menu-toggle').checked=false"></div>

    <aside class="side-menu">
        <h3 style="color:var(--accent); margin-bottom:15px; text-align: center;">SÍGUENOS</h3>
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social instagram"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social whatsapp"><i class="fab fa-whatsapp"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social telegram"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social tiktok"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://soundcloud.com/primerastereo" target="_blank" class="btn-social soundcloud"><i class="fab fa-soundcloud"></i> Soundcloud</a>
        <a href="https://www.youtube.com/@primerastereo" target="_blank" class="btn-social youtube"><i class="fab fa-youtube"></i> Youtube</a>
        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social x-twitter"><i class="fab fa-x-twitter"></i> Twitter / X</a>
        <a href="https://www.threads.net/@primera.stereo" target="_blank" class="btn-social threads"><i class="fa-brands fa-threads"></i> Threads</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social app-store"><i class="fab fa-google-play"></i> Descargar App</a>
    </aside>

    <main>
        <h1 class="main-title">PRIMERA STEREO</h1>
        <p class="sub-title">Radio Video Online</p>
        
        <div class="logo-container">
            <div id="video-container"><div id="yt-player"></div></div>
            <img src="https://primerastereo.netlify.app/favicon.png" id="album-art">
        </div>

        <div class="track-info">
            <div class="marquee-content">
                <span id="artist-name">CONECTANDO...</span>
                <span id="song-title">ESPERE UN MOMENTO</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="controls">
            <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
        </div>

        <div class="ad-section">
            <p class="ad-label">PATROCINANTES</p>
            <a id="ad-link" href="#" target="_blank"><img id="ad-banner" src=""></a>
        </div>

        <p class="copy">© 2010 - 2026 PRIMERA STEREO</p>
    </footer>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script>
        const art = document.getElementById('album-art');
        const bg = document.getElementById('bg-layer');
        const audio = document.getElementById('audio-player');
        let player, currentTrack = "";

        // Lógica de Banners
        const banners = [
            { img: "https://primerastereo.netlify.app/Anuncie%20aquí.jpg", link: "https://api.whatsapp.com/send?phone=+584127097429" },
            { img: "https://primerastereo.netlify.app/Alvacom%20Systems.jpg", link: "https://www.facebook.com/AlvacomSystems" },
            { img: "https://primerastereo.netlify.app/KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" }
        ];
        let bIdx = 0;

        function rotateBanners() {
            document.getElementById('ad-banner').src = banners[bIdx].img;
            document.getElementById('ad-link').href = banners[bIdx].link;
            bIdx = (bIdx + 1) % banners.length;
        }

        // YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onError': () => { art.style.opacity = "1"; } }
            });
        }

        async function update() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();
                
                if (currentTrack !== data.title) {
                    currentTrack = data.title;

                    setTimeout(async () => {
                        const artist = data.artist.name;
                        const title = data.title;
                        document.getElementById('artist-name').innerText = artist.toUpperCase();
                        document.getElementById('song-title').innerText = title.toUpperCase();

                        if(player && player.stopVideo) player.stopVideo();
                        document.getElementById('yt-player').style.opacity = "0";
                        art.style.opacity = "1";
                        art.classList.remove('animar-logo');

                        const esJingle = artist.toUpperCase().includes("PRIMERA STEREO") || title.toUpperCase().includes("JINGLE");

                        if (esJingle) {
                            art.src = "https://primerastereo.netlify.app/favicon.png";
                            art.classList.add('animar-logo');
                            bg.style.backgroundImage = "none";
                        } else {
                            // Carátulas iTunes
                            const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`);
                            const iData = await itunes.json();
                            let img = (iData.results.length > 0) ? iData.results[0].artworkUrl100.replace('100x100', '600x600') : 'https://primerastereo.netlify.app/favicon.png';
                            art.src = img;
                            bg.style.backgroundImage = `url('${img}')`;

                            // Búsqueda Video Youtube
                            const query = encodeURIComponent(artist + " " + title + " official video");
                            fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + query)}`)
                            .then(r => r.text())
                            .then(html => {
                                const id = html.match(/"videoId":"([^"]+)"/);
                                if (id && id[1] && player && player.loadVideoById) {
                                    player.loadVideoById({ videoId: id[1] });
                                    player.mute();
                                    setTimeout(() => {
                                        if (player.getPlayerState() === 1) {
                                            art.style.opacity = "0";
                                            document.getElementById('yt-player').style.opacity = "1";
                                        }
                                    }, 4000);
                                }
                            });
                        }
                    }, 3000); 
                }
                rotateBanners();
            } catch (e) { console.log("Error..."); }
        }

        document.getElementById('play-btn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; }
        };

        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        setInterval(update, 15000);
        update();
        rotateBanners();
    </script>
</body>
</html>
