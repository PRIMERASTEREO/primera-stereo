<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO Radio Video Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary-color: #6c5ce7; --bg-dark: #000000; --accent: #FFFF00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); z-index: -2; transition: 2s; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)); z-index: -1; }

        /* MENU */
        #menu-toggle { display: none; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1100; cursor: pointer; color: white; font-size: 20px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(10, 10, 10, 0.98); transition: 0.4s; z-index: 1050; padding: 70px 15px 20px 15px; border-right: 1px solid var(--primary-color); overflow-y: auto; }
        #menu-toggle:checked + .side-menu { left: 0; }
        .btn-social { display: flex; align-items: center; padding: 10px 15px; margin-bottom: 6px; border-radius: 8px; text-decoration: none; color: white; font-size: 0.85rem; background: rgba(255,255,255,0.08); transition: 0.3s; }
        .btn-social i { margin-right: 12px; width: 20px; text-align: center; font-size: 1.1rem; }
        .whatsapp i { color: #25D366; } .facebook i { color: #1877F2; } .instagram i { color: #E1306C; }

        /* PLAYER */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; width: 100%; }
        .logo-container { width: 300px; height: 300px; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); background: #111; }
        
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #yt-player { width: 100%; height: 100%; transform: scale(1.8); pointer-events: none; opacity: 0; transition: 1s; }
        
        /* Carátula siempre visible al inicio */
        #album-art { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 5; opacity: 1; transition: 1s; }

        .track-info { margin-top: 15px; width: 100%; overflow: hidden; }
        #song-title { color: var(--primary-color); font-size: 1.1rem; display: inline-block; white-space: nowrap; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        footer { width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .play-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--primary-color); border: none; color: white; cursor: pointer; font-size: 1.5rem; }
        .ad-box img { width: 100%; max-width: 300px; height: 60px; object-fit: contain; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>
    <div class="bg-overlay"></div>

    <label for="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></label>
    <input type="checkbox" id="menu-toggle">

    <aside class="side-menu">
        <h3 style="color:var(--accent); margin-bottom:20px;">SÍGUENOS</h3>
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social instagram"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social whatsapp"><i class="fab fa-whatsapp"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social telegram"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social tiktok"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social download"><i class="fas fa-download"></i> App</a>
    </aside>

    <main>
        <h1 style="color:var(--accent); font-size: 1.5rem;">PRIMERA STEREO</h1>
        <div class="logo-container">
            <div id="video-container"><div id="yt-player"></div></div>
            <img src="https://primerastereo.netlify.app/favicon.png" id="album-art">
        </div>
        <div class="track-info">
            <h2 id="artist-name" style="font-size: 1.2rem;">PRIMERA STEREO</h2>
            <p id="song-title">Cargando señal...</p>
        </div>
    </main>

    <footer>
        <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" style="width:180px; margin:15px 0; accent-color: var(--accent);">
        <div class="ad-box">
            <a id="ad-link" href="#" target="_blank"><img src="https://primerastereo.netlify.app/Anuncie%20aquí.jpg" id="ad-img"></a>
        </div>
    </footer>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script>
        const art = document.getElementById('album-art'), bg = document.getElementById('bg-layer');
        const ytElem = document.getElementById('yt-player'), audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let player;

        // Publicidad
        const ads = [
            { img: "Anuncie%20aquí.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" },
            { img: "Alvacom%20Systems.jpg", link: "https://www.instagram.com/alvacomsystems/" },
            { img: "KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" }
        ];
        let curAd = 0;
        setInterval(() => {
            curAd = (curAd + 1) % ads.length;
            document.getElementById('ad-img').src = `https://primerastereo.netlify.app/${ads[curAd].img}`;
            document.getElementById('ad-link').href = ads[curAd].link;
        }, 10000);

        // YouTube API
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0 },
                events: {
                    'onStateChange': (e) => {
                        if (e.data == YT.PlayerState.PLAYING) {
                            art.style.opacity = "0"; ytElem.style.opacity = "1";
                        } else {
                            art.style.opacity = "1"; ytElem.style.opacity = "0";
                        }
                    }
                }
            });
        }

        async function update() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();
                const st = document.getElementById('song-title');

                if (st.innerText !== data.title) {
                    document.getElementById('artist-name').innerText = data.artist.name;
                    st.innerText = data.title;
                    
                    // Al cambiar canción, carátula arriba siempre
                    art.style.opacity = "1"; ytElem.style.opacity = "0";

                    // Imagen desde iTunes
                    const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(data.artist.name + " " + data.title)}&entity=song&limit=1`);
                    const iData = await itunes.json();
                    let img = (iData.results.length > 0) ? iData.results[0].artworkUrl100.replace('100x100', '600x600') : 'https://primerastereo.netlify.app/favicon.png';
                    art.src = img; bg.style.backgroundImage = `url('${img}')`;

                    // Buscar video
                    fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + data.artist.name + ' ' + data.title + ' official video')}`)
                    .then(r => r.text()).then(html => {
                        const id = html.match(/"videoId":"([^"]+)"/);
                        if (id && id[1] && player && player.loadVideoById) {
                            player.loadVideoById(id[1]);
                        }
                    }).catch(() => { art.style.opacity = "1"; });
                }
            } catch (e) { console.log("Error update"); }
        }

        // Control de reproducción y volumen
        audio.volume = 0.5; // Volumen inicial al 50%
        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;

        setInterval(update, 15000); update();
    </script>
</body>
</html>
