<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO - Radio Video Online</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Base y Estructura */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- MENÚ LATERAL REPARADO --- */
        #menu-toggle { display: none; }

        /* Botón de apertura (☰) */
        .menu-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            cursor: pointer;
            background: #222;
            color: #fff;
            padding: 10px 12px;
            border-radius: 5px;
            font-size: 1.2rem;
            border: 1px solid #444;
        }

        .sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 260px;
            height: 100%;
            background: #0a0a0a;
            border-right: 2px solid #330066;
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Cuando el checkbox está activo, se muestra el menú */
        #menu-toggle:checked + .sidebar { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }
        .sidebar h2 { color: #ffff00; font-size: 1.1rem; }
        .close-menu { cursor: pointer; font-size: 1.4rem; color: #ff0000; }

        .btn-social {
            background: #1a1a1a;
            color: #fff;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
        }
        .btn-social i { width: 25px; margin-right: 10px; text-align: center; }

        /* --- CONTENEDOR PRINCIPAL CENTRADO --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }

        /* Caja del Reproductor */
        .player-container {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* Títulos (Reparada visibilidad) */
        .title-block { margin-bottom: 15px; }
        .main-title { color: #ffff00; font-size: 1.8rem; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        .sub-title { color: #fff; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Área de Visualización (Logo/Video) */
        #display-area {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid #222;
            margin-bottom: 15px;
        }

        #yt-iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
        #cover-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: block; }

        /* Metadatos */
        .info-block { margin-bottom: 15px; min-height: 50px; }
        #artist { font-size: 1.2rem; font-weight: bold; color: #fff; display: block; }
        
        .marquee { width: 100%; overflow: hidden; white-space: nowrap; margin-top: 5px; }
        #song { color: #6666ff; font-size: 1rem; display: inline-block; animation: scroll 10s linear infinite; }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Controles */
        .controls { margin-bottom: 20px; }
        .btn-play {
            background: #6644ff;
            border: none;
            width: 55px; height: 55px;
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .vol-box { margin-top: 10px; display: flex; align-items: center; gap: 10px; justify-content: center; }
        #vol-slider { width: 120px; accent-color: #ffff00; cursor: pointer; }

        /* Publicidad */
        .ad-box { width: 100%; border-top: 1px solid #222; padding-top: 10px; }
        .ad-text { color: #ffff00; font-size: 0.6rem; font-weight: bold; margin-bottom: 5px; }
        #ad-img { width: 100%; max-height: 70px; object-fit: contain; }

        .footer-text { font-size: 0.6rem; color: #444; margin-top: 10px; }

        /* --- AJUSTES PARA PC --- */
        @media (min-width: 1024px) {
            .sidebar { transform: translateX(0); }
            .menu-btn, .close-menu { display: none; }
            .main-content { margin-left: 260px; }
        }
    </style>
</head>
<body>

    <label for="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></label>
    <input type="checkbox" id="menu-toggle">

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>SÍGUENOS</h2>
            <label for="menu-toggle" class="close-menu"><i class="fas fa-times"></i></label>
        </div>
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social"><i class="fab fa-instagram" style="color:#E1306C"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social"><i class="fab fa-facebook-f" style="color:#1877F2"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social"><i class="fab fa-whatsapp" style="color:#25D366"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social"><i class="fab fa-telegram-plane" style="color:#0088CC"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://soundcloud.com/primerastereo" target="_blank" class="btn-social"><i class="fab fa-soundcloud" style="color:#FF5500"></i> Soundcloud</a>
        <a href="https://www.youtube.com/@primerastereo" target="_blank" class="btn-social"><i class="fab fa-youtube" style="color:#FF0000"></i> Youtube</a>
        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social"><i class="fab fa-x-twitter"></i> Twitter / X</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social"><i class="fas fa-download" style="color:#00ff00"></i> Descargar App</a>
    </div>

    <div class="main-content">
        <div class="player-container">
            
            <div class="title-block">
                <div class="main-title">PRIMERA STEREO</div>
                <div class="sub-title">Radio Video Online</div>
            </div>

            <div id="display-area">
                <div id="yt-player"></div>
                <img id="cover-img" src="https://primerastereo.netlify.app/favicon.png">
            </div>

            <div class="info-block">
                <span id="artist">Cargando...</span>
                <div class="marquee">
                    <span id="song">Conectando señal...</span>
                </div>
            </div>

            <div class="controls">
                <button id="play-pause" class="btn-play"><i class="fas fa-play"></i></button>
                <div class="vol-box">
                    <i class="fas fa-volume-down" style="font-size:0.8rem"></i>
                    <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.8">
                    <i class="fas fa-volume-up" style="font-size:0.8rem"></i>
                </div>
            </div>

            <div class="ad-box">
                <p class="ad-text">PATROCINANTE</p>
                <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank">
                    <img id="ad-img" src="https://primerastereo.netlify.app/Anuncie%20aquí.jpg">
                </a>
            </div>

            <p class="footer-text">© 2010 - 2026 PRIMERA STEREO</p>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const STREAM = "https://primerastereo.stream.laut.fm/primerastereo";
        const API = "https://api.laut.fm/station/primerastereo/current_song";
        
        const audio = new Audio(STREAM);
        const playBtn = document.getElementById('play-pause');
        const coverImg = document.getElementById('cover-img');
        let ytPlayer;
        let lastSong = "";

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                if(ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
            }
        });

        // Volumen
        document.getElementById('vol-slider').addEventListener('input', (e) => audio.volume = e.target.value);

        // YouTube API
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'modestbranding': 1, 'rel': 0 },
                events: {
                    'onStateChange': (e) => {
                        const frame = document.getElementById('yt-player');
                        if (e.data == YT.PlayerState.PLAYING) {
                            frame.style.display = "block";
                            coverImg.style.display = "none";
                        } else {
                            frame.style.display = "none";
                            coverImg.style.display = "block";
                        }
                    }
                }
            });
        }

        async function update() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                const songInfo = `${d.artist.name} - ${d.title}`;

                if (songInfo !== lastSong) {
                    lastSong = songInfo;
                    document.getElementById('artist').innerText = d.artist.name;
                    document.getElementById('song').innerText = d.title;
                    
                    // Buscar video
                    const search = encodeURIComponent(songInfo + " official video");
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/results?search_query=' + search)}`);
                    const data = await res.json();
                    const id = data.contents.match(/\/watch\?v=([a-zA-Z0-9_-]{11})/);
                    
                    if (id && ytPlayer && ytPlayer.loadVideoById) {
                        ytPlayer.loadVideoById(id[1]);
                    } else {
                        // Si falla el video, volvemos a la carátula
                        document.getElementById('yt-player').style.display = "none";
                        coverImg.style.display = "block";
                        // Usamos la carátula de Laut.fm si existe, si no, tu logo
                        coverImg.src = d.image_huge || "https://primerastereo.netlify.app/favicon.png";
                    }
                }
            } catch (e) {}
        }

        setInterval(update, 15000);
        update();
    </script>
</body>
</html>
