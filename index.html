    <style>
        :root { --primary-color: #6c5ce7; --bg-dark: #000000; --accent: #FFFF00; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.2); z-index: -2; transition: 2s;
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)); z-index: -1;
        }

        /* MENU RRSS */
        #menu-toggle { display: none; }
        .menu-btn {
            position: fixed; top: 15px; left: 15px; z-index: 1100;
            cursor: pointer; color: white; font-size: 20px;
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;
        }

        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); transition: 0.4s; z-index: 1050;
            padding: 70px 15px 20px 15px; border-right: 1px solid var(--primary-color); 
            overflow-y: auto;
        }
        #menu-toggle:checked + .side-menu { left: 0; }
        
        .btn-social {
            display: flex; align-items: center; padding: 10px 15px; margin-bottom: 6px;
            border-radius: 8px; text-decoration: none; color: white; font-size: 0.85rem;
            background: rgba(255,255,255,0.08); transition: 0.3s;
        }
        .btn-social i { margin-right: 12px; width: 20px; text-align: center; font-size: 1.1rem; }
        .instagram i { color: #E1306C; } .facebook i { color: #1877F2; } .whatsapp i { color: #25D366; }
        .telegram i { color: #0088CC; } .tiktok i { color: #00f2ea; } .soundcloud i { color: #FF5500; }
        .youtube i { color: #FF0000; } .x-twitter i { color: #FFFFFF; } .threads i { color: #FFFFFF; }
        .download i { color: #3ddc84; }

        /* PLAYER CORE */
        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            text-align: center; width: 100%; max-width: 500px;
        }

        .main-title { color: var(--accent); font-size: 1.6rem; letter-spacing: 2px; }
        .sub-title { letter-spacing: 4px; opacity: 1.6; font-size: 0.65rem; margin-bottom: 15px; }

        .logo-container {
            width: 300px; height: 300px;
            border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); background: #111; margin-bottom: 12px;
        }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #yt-player { width: 100%; height: 100%; transform: scale(1.8); pointer-events: none; opacity: 0; transition: 1s; }
        #album-art { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; transition: 1s; opacity: 1; }

        .track-info { width: 100%; overflow: hidden; white-space: nowrap; }
        #artist-name { font-size: 1.35rem; font-weight: 600; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }
        #song-title { color: var(--primary-color); font-size: 1.15rem; display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }

        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        footer { width: 100%; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .play-btn { width: 62px; height: 62px; border-radius: 50%; background: var(--primary-color); border: none; color: white; cursor: pointer; font-size: 1.5rem; margin-bottom: 8px; }
        #volume-slider { width: 180px; accent-color: var(--accent); margin-bottom: 12px; }
        .ad-box { width: 100%; max-width: 320px; text-align: center; }
        #ad-img { width: 100%; height: 60px; object-fit: contain; border-radius: 8px; transition: 0.5s; }
    </style>
</head>

<body>

    <aside class="side-menu">

        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social x-twitter"><i class="fab fa-x-twitter"></i> Twitter / X</a>

        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social download"><i class="fas fa-download"></i> Descargar App</a>
    </aside>

    <main>
        <h1 class="main-title">PRIMERA STEREO</h1>
        <p class="sub-title">Radio Video Online</p>
        <div class="logo-container">
            <div id="video-container"><div id="yt-player"></div></div>
            <img src="https://primerastereo.netlify.app/favicon.png" id="album-art">
        </div>
        <div class="track-info">
            <h2 id="artist-name">PRIMERA STEREO</h2>
            <p id="song-title">Cargando...</p>
        </div>
    </main>

    <footer>
        <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
        <div class="ad-box">
            <p style="font-size:0.55rem; color:var(--accent); margin-bottom:4px;">PATROCINANTE</p>
            <a id="ad-link" href="https://api.whatsapp.com/send?phone=+5804127097429&text=Hola%20estoy%20escuchando%20la%20radio%20y%20quiero%20informaci%C3%B3n%20%20de%20la%20publicidad" target="_blank"><img src="https://primerastereo.netlify.app/Anuncie%20aquí.jpg" id="ad-img"></a>
        </div>
        <p style="font-size:0.6rem; opacity:1.6; margin-top:10px;">© 2010 - 2026 PRIMERA STEREO Radio Video Online</p>
    </footer>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script>
        const art = document.getElementById('album-art');
        const bg = document.getElementById('bg-layer');
        const ytElem = document.getElementById('yt-player');
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let player, searchTimeout;

        const ads = [
            { img: "Anuncie%20aquí.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" },
            { img: "Alvacom%20Systems.jpg", link: "https://www.instagram.com/alvacomsystems/" },
            { img: "KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" }
        ];

        let curAd = 0;
        setInterval(() => {
            const adImg = document.getElementById('ad-img');
            const adLink = document.getElementById('ad-link');
            if(adImg){
                adImg.style.opacity = "0";
                setTimeout(() => {
                    curAd = (curAd + 1) % ads.length;
                    adImg.src = `https://primerastereo.netlify.app/${ads[curAd].img}`;
                    adLink.href = ads[curAd].link;
                    adImg.style.opacity = "1";
                }, 500);
            }
        }, 10000);

        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                host: 'https://www.youtube.com',
                playerVars: { 
                    'autoplay': 1, 'mute': 1, 'controls': 0, 
                    'modestbranding': 1, 'rel': 0, 'enablejsapi': 1,
                    'origin': window.location.origin 
                },
                events: {
                    'onStateChange': (event) => {
                        // LA CLAVE: Solo ocultar carátula si el video realmente está reproduciendo
                        if (event.data == YT.PlayerState.PLAYING) {
                            clearTimeout(searchTimeout);
                            art.style.opacity = "0"; 
                            ytElem.style.opacity = "1";
                        } else {
                            // En cualquier otro estado (cargando, error, pausa), mostramos carátula
                            art.style.opacity = "1"; 
                            ytElem.style.opacity = "0";
                        }
                    },
                    'onError': () => { 
                        clearTimeout(searchTimeout);
                        art.style.opacity = "1"; 
                        ytElem.style.opacity = "0"; 
                    }
                }
            });
        }

        async function update() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();
                const songTitleElem = document.getElementById('song-title');

                if (songTitleElem.getAttribute('data-current') !== data.title) {
                    songTitleElem.setAttribute('data-current', data.title);
                    document.getElementById('artist-name').innerText = data.artist.name;
                    songTitleElem.innerText = data.title;

                    if(player && player.stopVideo) player.stopVideo();
                    ytElem.style.opacity = "0";
                    art.style.opacity = "1";

                    if (data.artist.name.toUpperCase().includes("PRIMERA STEREO")) {
                        art.src = "https://primerastereo.netlify.app/favicon.png";
                        bg.style.backgroundImage = "none";
                    } else {
                        const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(data.artist.name + " " + data.title)}&entity=song&limit=1`);
                        const iData = await itunes.json();
                        let img = (iData.results.length > 0) ? iData.results[0].artworkUrl100.replace('100x100', '600x600') : 'https://primerastereo.netlify.app/favicon.png';
                        art.src = img; bg.style.backgroundImage = `url('${img}')`;

                        fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + encodeURIComponent(data.artist.name + " " + data.title + " official video"))}`)
                        .then(r => r.text()).then(html => {
                            const id = html.match(/"videoId":"([^"]+)"/);
                            if (id && id[1] && player && player.loadVideoById) {
                                player.loadVideoById({ videoId: id[1], startSeconds: 0 });
                                
                                clearTimeout(searchTimeout);
                                searchTimeout = setTimeout(() => {
                                    if(ytElem.style.opacity !== "1") {
                                        art.style.opacity = "1";
                                        ytElem.style.opacity = "0";
                                    }
                                }, 7000);
                            }
                        }).catch(() => { art.style.opacity = "1"; ytElem.style.opacity = "0"; });
                    }
                }
            } catch (e) {}
        }

        const intentarReproducir = () => {
            audio.play().then(() => {
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                ["click", "touchstart", "keydown"].forEach(evt => document.removeEventListener(evt, intentarReproducir));
            }).catch(() => {});
        };

        window.addEventListener('load', intentarReproducir);
        ["click", "touchstart", "keydown"].forEach(evt => document.addEventListener(evt, intentarReproducir, { once: true }));

        playBtn.onclick = (e) => {
            e.stopPropagation();
            if (audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };

        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        setInterval(update, 15000);
        update();

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(event) {
            if ((event.ctrlKey && event.key === 'u') || (event.ctrlKey && event.shiftKey && event.key === 'I') || event.key === 'F12') {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
