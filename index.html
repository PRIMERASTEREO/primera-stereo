<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO - Radio Video Online</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Reset y Estilos Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden; /* Elimina scroll para evitar F11 */
            display: flex;
            position: relative;
        }

        /* --- MENÚ LATERAL RESPONSIVO (CORRECCIÓN TOTAL) --- */
        #menu-toggle { display: none; } /* Checkbox oculto para controlar el menú */

        /* Botón de abrir (☰) - Solo visible en móvil */
        .menu-open-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            cursor: pointer;
            color: white;
            font-size: 1.8rem;
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 8px;
            display: none; /* Oculto por defecto en PC */
        }

        /* Contenedor del menú */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 10, 0.98);
            border-right: 2px solid #330066;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            height: 100vh;
            z-index: 1050;
            transition: transform 0.3s ease; /* Animación de apertura */
        }

        /* Título del menú y botón cerrar (✕) */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .sidebar h2 { color: #ffff00; font-size: 1.4rem; letter-spacing: 1px; flex-grow: 1; text-align: center;}
        
        .menu-close-btn {
            cursor: pointer;
            color: #666;
            font-size: 1.5rem;
            display: none; /* Oculto en PC */
        }
        .menu-close-btn:hover { color: #ff0000; }

        /* Botones sociales */
        .btn-social {
            background: rgba(255,255,255,0.05);
            color: #fff;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .btn-social:hover { background: rgba(102, 68, 255, 0.3); }
        .btn-social i { margin-right: 15px; font-size: 1.2rem; width: 25px; text-align: center;}

        /* Colores de iconos */
        .fa-instagram { color: #E1306C; }
        .fa-facebook-f { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }
        .fa-telegram-plane { color: #0088CC; }
        .fa-tiktok { color: #fff; }
        .fa-soundcloud { color: #FF5500; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #fff; }
        .fa-threads { color: #fff; }
        .fa-download { color: #00ff00; }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-title { color: #ffff00; font-weight: bold; font-size: 2rem; letter-spacing: 2px; }
        .sub-title { font-size: 0.9rem; letter-spacing: 4px; margin-top: -5px; opacity: 0.8; }

        /* Contenedor Adaptable */
        #media-container {
            width: 80%;
            max-width: 420px;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(80, 0, 150, 0.5);
            position: relative;
            margin: 10px 0;
        }

        #yt-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s; z-index: 1; }
        #album-art { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 1s; z-index: 5; }

        /* Metadata y Marquesina */
        .metadata { margin: 10px 0; width: 90%;}
        #artist-name { font-size: 1.4rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        
        .marquee-box { width: 100%; overflow: hidden; white-space: nowrap; }
        #song-title { color: #6666ff; font-size: 1.1rem; display: inline-block; padding-left: 100%; animation: marquee 12s linear infinite; }
        
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* Controles */
        footer { width: 100%; padding: 10px 20px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        
        .play-btn {
            background: #6644ff;
            border: none;
            width: 65px; height: 65px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(102, 68, 255, 0.4);
            transition: 0.3s;
        }
        .play-btn:hover { background: #7755ff; transform: scale(1.05); }

        .volume-container { width: 180px; margin: 10px auto; display: flex; align-items: center; gap: 10px; }
        #volume-slider { flex: 1; cursor: pointer; accent-color: #ffff00; }

        /* Publicidad */
        .ad-box { width: 100%; max-width: 380px; margin: 5px 0;}
        #ad-img { width: 100%; height: 60px; object-fit: contain; border-radius: 8px; }

        .copyright { font-size: 0.7rem; color: #555; padding-bottom: 5px; letter-spacing: 1px;}

        /* --- RESPONSIVE MEDIA QUERIES --- */
        
        /* PC y Tablets (Pantallas anchas) */
        @media (min-width: 769px) {
            .sidebar { transform: translateX(0) !important; position: relative; } /* Siempre visible */
            .menu-open-btn, .menu-close-btn { display: none !important; } /* Ocultar botones de toggle */
        }

        /* Móviles (Pantallas estrechas) */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%); /* Empieza cerrado a la izquierda */
            }
            .menu-open-btn { display: block; } /* Mostrar ☰ */
            .menu-close-btn { display: block; } /* Mostrar ✕ */
            
            /* Cuando el checkbox está marcado, abrir menú */
            #menu-toggle:checked + .menu-open-btn + .sidebar {
                transform: translateX(0);
            }

            .main-container { width: 100%; padding-top: 60px; } /* Espacio para el botón ☰ */
            .header-title { font-size: 1.6rem; }
            #media-container { width: 90%; }
        }

    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">
    
    <label for="menu-toggle" class="menu-open-btn"><i class="fas fa-bars"></i></label>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>SÍGUENOS</h2>
            <label for="menu-toggle" class="menu-close-btn"><i class="fas fa-times"></i></label>
        </div>
        
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social"><i class="fab fa-facebook-f"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social"><i class="fab fa-whatsapp"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://soundcloud.com/primerastereo" target="_blank" class="btn-social"><i class="fab fa-soundcloud"></i> Soundcloud</a>
        <a href="https://www.youtube.com/@primerastereo" target="_blank" class="btn-social"><i class="fab fa-youtube"></i> Youtube</a>
        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social"><i class="fab fa-x-twitter"></i> Twitter / X</a>
        <a href="https://www.threads.net/@primera.stereo" target="_blank" class="btn-social"><i class="fa-brands fa-threads"></i> Threads</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social"><i class="fas fa-download"></i> Descargar App</a>
    </div>

    <div class="main-container">
        <div>
            <div class="header-title">PRIMERA STEREO</div>
            <div class="sub-title">Radio Video Online</div>
        </div>

        <div id="media-container">
            <div id="yt-player"></div>
            <img id="album-art" src="https://primerastereo.netlify.app/favicon.png" alt="Carátula">
        </div>

        <div class="metadata">
            <div id="artist-name">PRIMERA STEREO</div>
            <div class="marquee-box">
                <p id="song-title">Conectando...</p>
            </div>
        </div>

        <div class="controls">
            <button id="play-pause" class="play-btn"><i class="fas fa-play"></i></button>
            <div class="volume-container">
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
            </div>
        </div>

        <footer>
            <div class="ad-box">
                <p style="color:#ffff00; font-size:0.65rem; margin-bottom:5px; font-weight:bold;">PATROCINANTE</p>
                <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank">
                    <img id="ad-banner" src="https://primerastereo.netlify.app/Anuncie%20aquí.jpg" alt="Publicidad">
                </a>
            </div>
            <p class="copyright">© 2010 - 2026 PRIMERA STEREO Radio Video Online</p>
        </footer>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // CONFIGURACIÓN (TUS URLs ORIGINALES)
        const STREAM_URL = "https://primerastereo.stream.laut.fm/primerastereo";
        const METADATA_URL = "https://api.laut.fm/station/primerastereo/current_song";
        
        // Elementos DOM
        const audio = new Audio(STREAM_URL);
        const playBtn = document.getElementById('play-pause');
        const volumeSlider = document.getElementById('volume-slider');
        const artistElem = document.getElementById('artist-name');
        const titleElem = document.getElementById('song-title');
        const albumArtElem = document.getElementById('album-art');
        const ytPlayerElem = document.getElementById('yt-player');
        
        let ytPlayer;
        let currentSong = "";

        // Inicializar Audio
        audio.volume = 0.8;

        // Reproducción
        playBtn.addEventListener('click', togglePlay);
        volumeSlider.addEventListener('input', (e) => audio.volume = e.target.value);

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                if (ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
            }
        }

        // YouTube API
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                playerVars: {
                    'autoplay': 1, 'controls': 0, 'modestbranding': 1,
                    'rel': 0, 'mute': 1, 'showinfo': 0, 'loop': 1
                },
                events: {
                    'onStateChange': (e) => {
                        // Si el video reproduce, ocultar carátula
                        if (e.data == YT.PlayerState.PLAYING) {
                            albumArtElem.style.opacity = "0";
                            ytPlayerElem.style.opacity = "1";
                        } else {
                            albumArtElem.style.opacity = "1";
                            ytPlayerElem.style.opacity = "0";
                        }
                    }
                }
            });
        }

        // Buscador Proxy para YouTube
        async function searchYouTubeVideo(query) {
            try {
                const proxyUrl = "https://api.allorigins.win/get?url=";
                const searchUrl = encodeURIComponent(`https://www.youtube.com/results?search_query=${query} official video`);
                const response = await fetch(proxyUrl + searchUrl);
                const data = await response.json();
                const html = data.contents;
                const regex = /\/watch\?v=([a-zA-Z0-9_-]{11})/;
                const match = html.match(regex);
                return (match && match[1]) ? match[1] : null;
            } catch (e) { return null; }
        }

        // Actualizar Metadata (Canción y Video)
        async function checkMetadata() {
            try {
                const response = await fetch(METADATA_URL);
                const data = await response.json();
                
                if (!data || !data.artist || !data.title) return;

                const artist = data.artist.name;
                const title = data.title;
                const newSong = `${artist} - ${title}`;

                if (newSong !== currentSong) {
                    currentSong = newSong;
                    artistElem.innerText = artist;
                    titleElem.innerText = title;

                    // Reiniciar marquesina
                    titleElem.style.animation = 'none';
                    titleElem.offsetHeight; /* trigger reflow */
                    titleElem.style.animation = null;

                    // Cargar Video
                    if (ytPlayer && ytPlayer.loadVideoById) {
                        const videoId = await searchYouTubeVideo(newSong);
                        if (videoId) ytPlayer.loadVideoById(videoId);
                    }
                    
                    // Carátula (Favicon por defecto, Laut.fm no da carátulas fiables)
                    albumArtElem.src = "https://primerastereo.netlify.app/favicon.png";
                }
            } catch (e) {}
        }

        // Ciclos
        setInterval(checkMetadata, 15000); // Revisa metadata cada 15 seg
        checkMetadata(); // Carga inicial

    </script>
</body>
</html>
