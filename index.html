<!DOCTYPE html>
<html lang="es">
<head>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=300;400;600&display=swap" rel="stylesheet">

	<link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />
    <style>
        :root { --primary-color: #1877F2; --bg-dark: #000000; --accent: #1877F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); z-index: -2; transition: 2s; }
        .bg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)); z-index: -1; }
        
        /* Menú Lateral */
        #menu-toggle { display: none; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1100; cursor: pointer; color: white; font-size: 22px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(10, 10, 10, 0.98); transition: 0.4s; z-index: 1050; padding: 20px; border-right: 1px solid var(--primary-color); overflow-y: auto; }
        #menu-toggle:checked + .side-menu { left: 0; }
        
        .btn-social { display: flex; align-items: center; padding: 10px 15px; margin-bottom: 6px; border-radius: 8px; text-decoration: none; color: white; font-size: 1.00rem; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-social i { margin-right: 12px; width: 22px; text-align: center; }
        
        /* Redes Sociales */
        .instagram i { color: #E1306C; }
        .facebook i  { color: #1877F2; }
        .whatsapp i  { color: #25D366; }
        .telegram i  { color: #0088CC; }
        .tiktok i    { color: #fff; }
        .soundcloud i { color: #ff8400; } 
        .youtube i   { color: #FF0000; }
        .x-twitter i { color: #FFFFFF; }
        .threads i   { color: #FFFFFF; }
        .app-store i { color: #A4C639; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        .main-title { color: var(--accent); font-size: 1.8rem; letter-spacing: 2px; }
        .sub-title { letter-spacing: 6px; opacity: 1.7; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Contenedor del Reproductor Oficial */
        .logo-container { width: 325px; height: 315px; border-radius: 15px; overflow: hidden; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.9); background: #000; margin-bottom: 15px; }
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #000; }
        .yt-iframe-class { width: 100%; height: 100%; border: none; transform: scale(1.8); pointer-events: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        #album-art { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; transition: opacity 0.4s ease-in-out; opacity: 1; }

        @keyframes pulse-extra {
            0% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0px var(--accent)); }
            50% { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 25px var(--accent)); }
            100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0px var(--accent)); }
        }
        .animar-logo { animation: pulse-extra 2s infinite ease-in-out; }

        /* Marquesina */
        .track-info { width: 340px; margin: 0 auto 10px; overflow: hidden; white-space: nowrap; }
        .marquee { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        #artist-name { font-size: 1.3rem; font-weight: 600; display: inline; }
        #song-title { color: var(--primary-color); font-size: 1.3rem; display: inline; margin-left: 20px; }

        /* Patrocinantes */
        .ads-container { width: 320px; text-align: center; margin: 5px 0; }
        .ads-title { color: var(--accent); font-size: 0.5rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        #ad-link img { width: 100%; max-height: 70px; object-fit: contain; }

        footer { padding: 10px 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .play-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--primary-color); border: none; color: white; cursor: pointer; font-size: 1.3rem; }
        #volume-slider { width: 220px; margin-top: 10px; accent-color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>
    <div class="bg-overlay"></div>
    
    <label for="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></label>
    <input type="checkbox" id="menu-toggle">

    <aside class="side-menu">
        <h3 style="color:var(--accent); margin-bottom:20px; padding-left:40px;">Síguenos</h3>
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social instagram"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social whatsapp"><i class="fab fa-whatsapp"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social telegram"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social tiktok"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://soundcloud.com/primerastereo" target="_blank" class="btn-social soundcloud"><i class="fab fa-soundcloud"></i> Soundcloud</a>
        <a href="https://www.youtube.com/@primerastereo" target="_blank" class="btn-social youtube"><i class="fab fa-youtube"></i> Youtube</a>
        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social x-twitter"><i class="fab fa-x-twitter"></i> Twitter / X</a>
        <a href="https://www.threads.net/@primera.stereo" target="_blank" class="btn-social threads"><i class="fas fa-at"></i> Threads</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social app-store"><i class="fab fa-google-play"></i> Descarga Nuestra App</a>
    </aside>

    <main>
        <h1 class="main-title">PRIMERA STEREO 📻</h1>
        <p class="sub-title">Radio Video Online</p>
        <div class="logo-container">
            <div id="video-container"></div>
            <img src="https://primerastereo.netlify.app/favicon.png" id="album-art">
        </div>
        <div class="track-info">
            <div class="marquee">
                <span id="artist-name">PRIMERA STEREO 📻 RADIO VIDEO ONLINE</span>
                <span id="song-title">Cargando...</span>
            </div>
        </div>
    </main>

    <footer>
        <button id="play-btn" class="play-btn"><i class="fas fa-pause"></i></button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
        
        <div class="ads-container">
            <p class="ads-title">TU PUBLICIDAD AQUÍ...</p>
            <a id="ad-link" href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank"><img id="ad-banner" src=""></a>
        </div>
        <p style="font-size: 0.6rem; opacity: 1.6; text-align: center;">© 2010 - 2026 PRIMERA STEREO<br>Radio Video Online</p>
    </footer>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script>
        // PEGA TU CLAVE DE GOOGLE ENTRE LAS COMILLAS:
        const YOUTUBE_API_KEY = "";

        const art = document.getElementById('album-art');
        const bg = document.getElementById('bg-layer');
        const audio = document.getElementById('audio-player');
        const videoContainer = document.getElementById('video-container');

        const banners = [
            { img: "https://primerastereo.netlify.app/disponible2.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" },
			{ img: "https://primera-stereo.netlify.app/BANNER%20ELENA.png", link: "https://api.whatsapp.com/send?phone=+5804127102509" },
            { img: "https://primerastereo.netlify.app/Alvacom%20Systems.jpg", link: "https://www.facebook.com/AlvacomSystems" },
            { img: "https://primerastereo.netlify.app/KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" },
			{ img: "https://primerastereoprueba.netlify.app/Diseño sin título.gif", link: "http://www.en3d.io" },
			{ img: "https://primerastereo.netlify.app/disponible1.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" }
        ];
        let bIdx = 0;

        function updateBanners() {
            document.getElementById('ad-banner').src = banners[bIdx].img;
            document.getElementById('ad-link').href = banners[bIdx].link;
            bIdx = (bIdx + 1) % banners.length;
        }

        function playDirectVideo(videoId) {
            const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&vq=medium&playsinline=1&enablejsapi=1&origin=${encodeURIComponent(window.location.origin)}`;
            videoContainer.innerHTML = `<iframe id="dynamic-yt" class="yt-iframe-class" src="${embedUrl}" allow="autoplay; encrypted-media"></iframe>`;
            
            setTimeout(() => {
                const iframe = document.getElementById('dynamic-yt');
                if (iframe) {
                    art.style.opacity = "0";
                    iframe.style.opacity = "1";
                }
            }, 3000);
        }

        // BUSCADOR EN VIVO DE GOOGLE OFICIAL (Indestructible)
        async function searchOfficialYoutubeId(artist, title) {
            if (YOUTUBE_API_KEY === "AIzaSyB587PR4Xec8bS3VpFu7si5lYZwYweyijQ" || !YOUTUBE_API_KEY) return null;
            try {
                const query = encodeURIComponent(`${artist} ${title} video oficial`);
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=1&key=${YOUTUBE_API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data && data.items && data.items.length > 0) {
                    return data.items[0].id.videoId;
                }
            } catch (e) {}
            return null;
        }

        async function update() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();
                const songTitleElem = document.getElementById('song-title');
                
                if (songTitleElem.getAttribute('data-current') !== data.title) {
                    songTitleElem.setAttribute('data-current', data.title);
                    
                    setTimeout(async () => {
                        const artist = data.artist.name;
                        const title = data.title;
                        document.getElementById('artist-name').innerText = artist;
                        songTitleElem.innerText = title;

                        videoContainer.innerHTML = '';
                        art.style.opacity = "1";
                        art.classList.remove('animar-logo');

                        if (artist.toUpperCase().includes("PRIMERA STEREO") || title.toUpperCase().includes("JINGLE")) {
                            art.src = "https://primerastereo.netlify.app/favicon.png";
                            art.classList.add('animar-logo');
                            bg.style.backgroundImage = "none";
                        } else {
                            let img = 'https://primerastereo.netlify.app/favicon.png';
                            try {
                                const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&entity=song&limit=1`);
                                const iData = await itunes.json();
                                if (iData.results.length > 0) img = iData.results[0].artworkUrl100.replace('100x100', '600x600');
                            } catch(e) {}
                            
                            art.src = img; 
                            bg.style.backgroundImage = `url('${img}')`;

                            // Consulta directa a la API de Google sin intermediarios
                            const id = await searchOfficialYoutubeId(artist, title);
                            if (id) {
                                playDirectVideo(id);
                            }
                        }
                    }, 3000);
                }
                updateBanners();
            } catch (e) {}
        }

        document.getElementById('play-btn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; }
        };
        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        setInterval(update, 15000);
        update(); updateBanners();
    </script>
</body>
</html>
