<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIMERA STEREO - Radio Video Online</title>
    <style>
        /* Reset y Estilos Base */
        * { margin: 0; padding: 0; box-box: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden; /* Elimina el scroll para evitar F11 */
            display: flex;
        }

        /* Barra Lateral Izquierda (SÍGUENOS) */
        .sidebar {
            width: 200px;
            background: rgba(20, 20, 20, 0.95);
            border-right: 2px solid #330066;
            display: flex;
            flex-direction: column;
            padding: 10px;
            height: 100vh;
            z-index: 100;
        }

        .sidebar h2 { color: #ffff00; font-size: 1.2rem; margin-bottom: 15px; }

        .btn-social {
            background: #222;
            color: #ddd;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .btn-social:hover { background: #333; color: #fff; }

        /* Contenido Principal (REPRODUCTOR) */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Distribuye elementos verticalmente */
            padding: 15px 0;
            text-align: center;
        }

        .header-title { color: #ffff00; font-weight: bold; font-size: 1.8rem; }
        .sub-title { font-size: 0.9rem; letter-spacing: 2px; margin-top: -5px; }

        /* Contenedor de Video/Carátula Adaptable */
        #media-container {
            width: 85%;
            max-width: 500px;
            aspect-ratio: 1/1; /* Mantiene proporción cuadrada */
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(80, 0, 150, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        #video-player, #album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .metadata { margin: 10px 0; }
        .artist-name { font-size: 1.4rem; font-weight: bold; }
        .song-title { color: #6666ff; font-size: 1.1rem; }

        /* Controles */
        .controls { margin-bottom: 10px; }
        .play-btn {
            background: #6644ff;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* Banner Publicitario Inferior */
        .footer-banner {
            width: 90%;
            max-width: 450px;
            height: auto;
            margin-bottom: 10px;
        }
        
        .footer-banner img { width: 100%; border-radius: 5px; }

        .copyright { font-size: 0.7rem; color: #888; padding-bottom: 5px; }

    </style>
</head>
<body>

    <div class="sidebar">
        <button id="menu-toggle" style="background:none; border:none; color:white; cursor:pointer; text-align:left; font-size:1.5rem;">☰</button>
        <h2>SÍGUENOS</h2>
        <a href="#" class="btn-social">Instagram</a>
        <a href="#" class="btn-social">Facebook</a>
        <a href="#" class="btn-social">Whatsapp</a>
        <a href="#" class="btn-social">Telegram</a>
        <a href="#" class="btn-social">Tiktok</a>
        <a href="#" class="btn-social">Youtube</a>
        <a href="#" class="btn-social">Twitter / X</a>
        <a href="#" class="btn-social">Threads</a>
        <a href="#" class="btn-social" style="color:#00ff00;">⬇ Descargar App</a>
    </div>

    <div class="main-container">
        <div>
            <div class="header-title">PRIMERA STEREO</div>
            <div class="sub-title">Radio Video Online</div>
        </div>

        <div id="media-container">
            <div id="player-content" style="width:100%; height:100%;">
                <img id="album-art" src="URL_DE_TU_CARATULA_POR_DEFECTO" alt="Carátula">
            </div>
        </div>

        <div class="metadata">
            <div id="artist" class="artist-name">Cargando Artista...</div>
            <div id="title" class="song-title">Cargando Canción...</div>
        </div>

        <div class="controls">
            <button class="play-btn">Ⅱ</button>
            <div style="width: 250px; height: 6px; background: #333; border-radius: 3px; margin: 15px auto; position: relative;">
                <div style="width: 75%; height: 100%; background: #ffff00; border-radius: 3px;"></div>
                <div style="width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: -3px; left: 75%;"></div>
            </div>
        </div>

        <div class="footer-banner">
            <p style="color:#ffff00; font-size:0.7rem; margin-bottom:2px;">PATROCINANTE</p>
            <img id="ad-banner" src="tu_banner_actual.jpg" alt="Publicidad">
        </div>

        <div class="copyright">
            © 2010 - 2026 PRIMERA STEREO Radio Video Online
        </div>
    </div>

    <script>
        // Lógica para alternar Video/Carátula
        // Aquí debes integrar tu API de Centova/Zara que entrega el ID de YouTube
        function updateMedia(hasVideo, youtubeId, coverUrl) {
            const container = document.getElementById('player-content');
            if (hasVideo && youtubeId) {
                container.innerHTML = `<iframe id="video-player" src="https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=1&controls=0&loop=1" frameborder="0" allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `<img id="album-art" src="${coverUrl}" alt="Carátula">`;
            }
        }

        // Ejemplo de ejecución (Esto debe conectarse a tu JSON de emisión)
        // updateMedia(true, 'ID_DE_VIDEO', 'URL_CARATULA');
    </script>
</body>
</html>
