<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO | Radio Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary-color: #6c5ce7; --bg-dark: #000000; --accent: #FFFF00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.2); z-index: -2; transition: 2s;
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9)); z-index: -1;
        }

        #menu-toggle { display: none; }
        .menu-btn {
            position: fixed; top: 10px; left: 10px; z-index: 1100;
            cursor: pointer; color: white; font-size: 20px;
            background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px;
        }

        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.98); transition: 0.4s; z-index: 1050;
            padding: 60px 15px 20px 15px; border-right: 1px solid var(--primary-color); 
            overflow-y: auto;
        }
        #menu-toggle:checked + .side-menu { left: 0; }
        
        .btn-social {
            display: flex; align-items: center; padding: 10px 15px; margin-bottom: 6px;
            border-radius: 8px; text-decoration: none; color: white; font-size: 0.85rem;
            background: rgba(255,255,255,0.08); transition: 0.3s;
        }
        .btn-social i { margin-right: 12px; width: 20px; text-align: center; font-size: 1.1rem; }

        .instagram i { color: #E1306C; }
        .facebook i  { color: #1877F2; }
        .whatsapp i  { color: #25D366; }
        .telegram i  { color: #0088CC; }
        .tiktok i    { color: #00f2ea; }
        .soundcloud i { color: #FF5500; }
        .youtube i   { color: #FF0000; }
        .x-twitter i { color: #FFFFFF; }
        .threads i   { color: #FFFFFF; }
        .download i  { color: #3ddc84; }

        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            text-align: center; width: 100%;
            padding-top: 10px;
        }

        .main-title { color: var(--accent); font-size: 1.5rem; letter-spacing: 2px; }
        .sub-title { letter-spacing: 4px; opacity: 1.6; font-size: 0.6rem; margin-bottom: 5px; }

        /* ÁREA DE VIDEO AGRANDADA A 280PX */
        .logo-container {
            width: 280px; height: 280px;
            border-radius: 15px; overflow: hidden; position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); background: #111; margin-bottom: 8px;
        }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #yt-player { width: 100%; height: 100%; transform: scale(1.8); pointer-events: none; opacity: 0; transition: 1s; }
        #album-art { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; transition: 1.5s; }

        /* METADATOS MÁS CERCA */
        .track-info { width: 90%; max-width: 400px; overflow: hidden; white-space: nowrap; margin-bottom: 2px; }
        #artist-name { font-size: 1.25rem; font-weight: 600; }
        #song-title { color: var(--primary-color); font-size: 1.05rem; display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }

        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        footer { padding: 5px 10px 10px 10px; display: flex; flex-direction: column; align-items: center; }
        .play-btn { width: 58px; height: 58px; border-radius: 50%; background: var(--primary-color); border: none; color: white; cursor: pointer; font-size: 1.3rem; margin-bottom: 5px; }
        #volume-slider { width: 170px; accent-color: var(--accent); margin-bottom: 8px; }

        .ad-box { width: 100%; max-width: 300px; margin-top: 5px; text-align: center; }
        #ad-img { width: 100%; height: 55px; object-fit: contain; border-radius: 6px; transition: 0.5s; }
    </style>
</head>

<body>
    <div class="bg-layer" id="bg-layer"></div>
    <div class="bg-overlay"></div>

    <label for="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></label>
    <input type="checkbox" id="menu-toggle">

    <aside class="side-menu">
        <h3 style="color:var(--accent); margin-bottom:15px; font-size: 1.1rem;">SÍGUENOS</h3>
        <a href="https://www.instagram.com/Primera.Stereo/" target="_blank" class="btn-social instagram"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.facebook.com/PrimeraStereoRadio" target="_blank" class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
        <a href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank" class="btn-social whatsapp"><i class="fab fa-whatsapp"></i> Whatsapp</a>
        <a href="https://t.me/PrimeraStereo" target="_blank" class="btn-social telegram"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="https://www.tiktok.com/@primerastereo" target="_blank" class="btn-social tiktok"><i class="fab fa-tiktok"></i> Tiktok</a>
        <a href="https://soundcloud.com/primerastereo" target="_blank" class="btn-social soundcloud"><i class="fab fa-soundcloud"></i> Soundcloud</a>
        <a href="https://www.youtube.com/@primerastereo" target="_blank" class="btn-social youtube"><i class="fab fa-youtube"></i> Youtube</a>
        <a href="https://x.com/Primera_Stereo" target="_blank" class="btn-social x-twitter"><i class="fab fa-x-twitter"></i> Twitter / X</a>
        <a href="https://www.threads.net/@primera.stereo" target="_blank" class="btn-social threads"><i class="fa-brands fa-threads"></i> Threads</a>
        <a href="https://www.appcreator24.com/app3819260-6rbmq8" target="_blank" class="btn-social download"><i class="fas fa-download"></i> Descargar App</a>
    </aside>

    <main>
        <h1 class="main-title">PRIMERA STEREO</h1>
        <p class="sub-title">Radio Video Online</p>
        <div class="logo-container">
            <div id="video-container"><div id="yt-player"></div></div>
            <img src="https://primerastereo.netlify.app/favicon.png" id="album-art">
        </div>
        <div class="track-info">
            <h2 id="artist-name">PRIMERA STEREO</h2>
            <p id="song-title">Cargando...</p>
        </div>
    </main>

    <footer>
        <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
        
        <div class="ad-box">
            <p style="font-size: 0.5rem; color: var(--accent); margin-bottom: 4px;">PATROCINANTE</p>
            <a id="ad-link" href="https://api.whatsapp.com/send?phone=+5804127097429" target="_blank">
                <img src="https://primerastereo.netlify.app/Anuncie%20aquí.jpg" id="ad-img">
            </a>
        </div>
        <p style="font-size: 0.55rem; opacity: 1.0; margin-top: 5px;">© 2010 - 2026 PRIMERA STEREO  RADIO VIDEO ONLINE</p>
    </footer>

    <audio id="audio-player" src="https://primerastereo.stream.laut.fm/primerastereo" crossorigin="anonymous"></audio>

    <script>
        const art = document.getElementById('album-art');
        const bg = document.getElementById('bg-layer');
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        let player;

        const ads = [
            { img: "Anuncie%20aquí.jpg", link: "https://api.whatsapp.com/send?phone=+5804127097429" },
            { img: "Alvacom%20Systems.jpg", link: "https://www.instagram.com/alvacomsystems/" },
            { img: "KINESIOLOGIA2.gif", link: "https://www.instagram.com/nely_alvarez" }
        ];

        let curAd = 0;
        setInterval(() => {
            const adImg = document.getElementById('ad-img');
            const adLink = document.getElementById('ad-link');
            adImg.style.opacity = "0";
            setTimeout(() => {
                curAd = (curAd + 1) % ads.length;
                adImg.src = `https://primerastereo.netlify.app/${ads[curAd].img}`;
                adLink.href = ads[curAd].link;
                adImg.style.opacity = "1";
            }, 500);
        }, 10000);

        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onError': () => { art.style.opacity = "1"; document.getElementById('yt-player').style.opacity = "0"; } }
            });
        }

        async function update() {
            try {
                const res = await fetch('https://api.laut.fm/station/primerastereo/current_song');
                const data = await res.json();
                const songTitleElem = document.getElementById('song-title');

                if (songTitleElem.getAttribute('data-current') !== data.title) {
                    songTitleElem.setAttribute('data-current', data.title);
                    document.getElementById('artist-name').innerText = data.artist.name;
                    songTitleElem.innerText = data.title;

                    if(player && player.stopVideo) player.stopVideo();
                    document.getElementById('yt-player').style.opacity = "0";
                    art.style.opacity = "1";

                    if (data.artist.name.toUpperCase().includes("PRIMERA STEREO")) {
                        art.src = "https://primerastereo.netlify.app/favicon.png";
                        bg.style.backgroundImage = "none";
                    } else {
                        const itunes = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(data.artist.name + " " + data.title)}&entity=song&limit=1`);
                        const iData = await itunes.json();
                        let img = (iData.results.length > 0) ? iData.results[0].artworkUrl100.replace('100x100', '600x600') : 'https://primerastereo.netlify.app/favicon.png';
                        art.src = img; bg.style.backgroundImage = `url('${img}')`;

                        fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent('https://www.youtube.com/results?search_query=' + encodeURIComponent(data.artist.name + " " + data.title + " official video"))}`)
                        .then(r => r.text()).then(html => {
                            const id = html.match(/"videoId":"([^"]+)"/);
                            if (id && id[1] && player && player.loadVideoById) {
                                player.loadVideoById({ videoId: id[1], startSeconds: 0 });
                                setTimeout(() => { art.style.opacity = "0"; document.getElementById('yt-player').style.opacity = "1"; }, 4000);
                            }
                        });
                    }
                }
            } catch (e) {}
        }

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };

        const autoStart = () => {
            audio.play().then(() => {
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                ["click", "touchstart"].forEach(e => document.removeEventListener(e, autoStart));
            }).catch(() => {});
        };
        ["click", "touchstart"].forEach(e => document.addEventListener(e, autoStart, { once: true }));

        document.getElementById('volume-slider').oninput = (e) => audio.volume = e.target.value;
        setInterval(update, 15000); update();
    </script>
</body>
</html>
