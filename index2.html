<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />   
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />
    
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* Restablecer estilos base y prevenir scroll absoluto en móviles */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Contenedor principal adaptable */
        .app-container {
            position: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fondo.png') no-repeat center center;
			background-size: 100% 100%;
			background-attachment: fixed;
            padding: 15px;
            text-align: center;
        }

        /* Botón de refrescar en esquina superior derecha */
        .refresh-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Encabezado */
        .header-section {
            z-index: 2;
            width: 100%;
            margin-top: 10px;
        }

        .main-logo {
            font-size: 22pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .sub-logo {
            font-size: 13pt;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-top: -2px;
        }

        /* Tarjeta del Reproductor */
        .player-card {
            position: relative;
            overflow: hidden;
            z-index: 2;
            width: 100%;
            max-width: 340px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: auto 0;
            min-height: 280px;
            justify-content: space-between;
        }

        /* Contenedor de fondo de YouTube - Totalmente protegido contra clics accidentales */
        .player-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; 
            opacity: 0.55;
        }

        .player-video-bg iframe {
            width: 100%;
            height: 100%;
            transform: scale(1.35);
            object-fit: cover;
            pointer-events: none;
        }

        /* CONTROLES INTERACTIVOS (RECUADRO VERDE) */
        .hover-control {
            position: relative;
            z-index: 5;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        /* Desaparece suavemente cuando el tema está sonando */
        .app-container.playing-mode .hover-control {
            opacity: 0;
        }

        /* Reaparece al pasar el mouse por encima (Hover) a voluntad */
        .player-card:hover .hover-control {
            opacity: 1 !important;
        }

        .station-title {
            font-size: 11pt;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .station-subtitle {
            font-size: 9pt;
            color: #a0aec0;
            margin-top: -5px;
        }

        /* Ecualizador animado */
        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 35px;
            margin: 5px 0;
        }

        .bar {
            width: 4px;
            height: 5px;
            background-color: #2563eb;
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        /* Botón de Play principal */
        .play-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0, 198, 255, 0.4);
            color: white;
            font-size: 24px;
        }

        /* Control de Volumen */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 85%;
            margin-top: 5px;
        }

        .volume-icon {
            color: #b0b3b8;
            font-size: 14px;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
        }

        /* BASE DEL REPRODUCITOR (RECUADRO AMARILLO SUSTITUYENDO AL ROJO) */
        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 10pt;
            font-weight: bold;
            color: #ffffff;
            z-index: 6;
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 12px;
            min-height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 5px;
        }
        
        .status-badge span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        /* Redes Sociales fijas abajo */
        .footer-section {
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-title {
            font-size: 10pt;
            color: #a0aec0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .social-btn.facebook:hover { background: #1877f2; }
        .social-btn.instagram:hover { background: #e1306c; }
        .social-btn.tiktok:hover { background: #000000; }
        .social-btn.youtube:hover { background: #ff0000; }
		.social-btn.google-play:hover { background: #0d9114; }
        
        .custom-logo img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .copyright {
            font-size: 8pt;
            color: #718096;
            line-height: 1.3;
        }

        /* Ajustes responsivos extremos para pantallas pequeñas */
        @media (max-height: 580px) {
            .player-card { padding: 12px; gap: 8px; min-height: 240px; }
            .main-logo { font-size: 18pt; }
            .play-btn { width: 52px; height: 52px; font-size: 18px; }
            .bars-container { height: 25px; }
            .footer-section { gap: 6px; }
        }
    </style>
</head>
<body>

    <button class="refresh-btn" id="refresh-btn" title="Refrescar streaming y actualizar metadatos">
        <i class="fas fa-sync-alt"></i>
    </button>

    <div class="app-container" id="main-app">
        <div class="header-section">
            <h1 class="main-logo">Primera Stereo</h1>
            <div class="sub-logo">Radio Online</div>
        </div>

        <div class="player-card" id="radio-container">
            <div id="player-video-bg" class="player-video-bg"></div>

            <div class="hover-control">
                

                <div class="bars-container" id="radio-visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

                <button class="play-btn" id="play-btn">
                    <i class="fas fa-play"></i>
                </button>

                <div class="volume-container">
                    <span><i class="fas fa-volume-down volume-icon"></i></span>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-slider">
                    <span><i class="fas fa-volume-up volume-icon"></i></span>
                </div>
            </div>

            <div class="status-badge" id="status">
                <i class="fas fa-broadcast-tower"></i> <span>Presiona Play para escuchar</span>
            </div>
        </div>

        <div class="footer-section">
            <div class="social-title">Síguenos en nuestras redes sociales</div>
            <div class="social-icons">
                <a href="https://www.facebook.com/PrimeraStereoRadio" class="social-btn facebook" target="_blank">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://www.instagram.com/Primera.Stereo/" class="social-btn instagram" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.tiktok.com/@primerastereo" class="social-btn tiktok" target="_blank">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://www.youtube.com/@PrimeraStereo" class="social-btn youtube" target="_blank">
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="https://www.appcreator24.com/app3819260-6rbmq8" class="social-btn google-play" target="_blank">
                    <i class="fab fa-google-play"></i>
                </a>
            </div>
            <div class="copyright">
                &copy;2010 - 2026 PRIMERA STEREO<br>RADIO ONLINE
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elementos del DOM
            const audioPlayer = new Audio();
            const playBtn = document.getElementById('play-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const statusElement = document.getElementById('status');
            const refreshBtn = document.getElementById('refresh-btn');
            const visualizer = document.getElementById('radio-visualizer');
            const bars = visualizer.querySelectorAll('.bar');
            const mainApp = document.getElementById('main-app');
            
            // URLs de Streaming y Metadatos de laut.fm
            const streamUrl = 'https://primerastereo.stream.laut.fm/primerastereo';
            const metadataApiUrl = 'https://api.laut.fm/station/primerastereo/current_song';
            
            // Integración de YouTube API
            const YOUTUBE_API_KEY = "AIzaSyB587PR4Xec8bS3VpFu7si5lYZwYweyijQ";
            let ytPlayer = null;
            let lastVideoQuery = "";
            
            // Estados generales
            let isPlaying = false;
            let metadataInterval = null;
            let animationId;
            
            // Inicializar volumen básico de la radio
            audioPlayer.volume = volumeSlider.value;
            
            // Función de la API de YouTube
            window.onYouTubeIframeAPIReady = function() {
                ytPlayer = new YT.Player('player-video-bg', {
                    height: '100%',
                    width: '100%',
                    videoId: '', 
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'showinfo': 0,
                        'rel': 0,
                        'loop': 1,
                        'mute': 1, 
                        'playsinline': 1,
                        'disablekb': 1
                    },
                    events: {
                        'onReady': function(event) {
                            event.target.mute();
                        }
                    }
                });
            };

            // Buscar y reproducir el clip de video de la canción actual
            async function searchAndPlayVideo(track, artist) {
                const query = `${artist} ${track}`;
                if (query === lastVideoQuery || !ytPlayer || !ytPlayer.loadVideoById) return;
                lastVideoQuery = query;

                try {
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();

                    if (data.items && data.items.length > 0) {
                        const videoId = data.items[0].id.videoId;
                        if (isPlaying) {
                            ytPlayer.loadVideoById({videoId: videoId});
                            ytPlayer.mute();
                            ytPlayer.playVideo();
                        } else {
                            ytPlayer.cueVideoById({videoId: videoId});
                        }
                    }
                } catch (error) {
                    console.error('Error buscando video en YouTube:', error);
                }
            }
            
            // Consumo de API de Metadatos en tiempo real
            async function updateMetadata() {
                try {
                    const response = await fetch(metadataApiUrl + '?t=' + new Date().getTime());
                    if (!response.ok) throw new Error('Error API');
                    const data = await response.json();
                    
                    if (data && data.title) {
                        const currentTrack = data.title;
                        const currentArtist = data.artist && data.artist.name ? data.artist.name : 'PRIMERA STEREO';
                        
                        // Reflejar la canción actual directamente en el recuadro amarillo inferior
                        statusElement.innerHTML = `<i class="fas fa-music"></i> <span>${currentArtist} - ${currentTrack}</span>`;

                        // Sincronizar el video en el fondo
                        searchAndPlayVideo(currentTrack, currentArtist);
                    } else {
                        if (isPlaying) {
                            statusElement.innerHTML = '<i class="fas fa-broadcast-tower"></i> <span>Al Aire - En Vivo</span>';
                        }
                    }
                } catch (error) {
                    console.error('Error obteniendo metadatos:', error);
                }
            }

            // Consulta continua cada 15 segundos
            updateMetadata();
            metadataInterval = setInterval(updateMetadata, 15000);

            // Animación del ecualizador visual
            function simulateVisualizer() {
                if (!isPlaying) {
                    bars.forEach(bar => bar.style.height = '5px');
                    return;
                }
                bars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 27) + 5;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.background = 'linear-gradient(to top, #2563eb, #00d4ff)';
                });
                animationId = requestAnimationFrame(simulateVisualizer);
            }

            // Alternar Reproducción y aplicar clases de ocultamiento visual
            function togglePlayback() {
                if (!isPlaying) {
                    statusElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
                    audioPlayer.src = streamUrl + '?cb=' + Date.now();
                    audioPlayer.crossOrigin = "anonymous";
                    
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        mainApp.classList.add('playing-mode'); // Activa el desvanecimiento del recuadro verde
                        simulateVisualizer();
                        updateMetadata();
                        
                        if (ytPlayer && ytPlayer.playVideo) {
                            ytPlayer.playVideo();
                        }
                    }).catch(error => {
                        console.error('Error al reproducir:', error);
                        statusElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error al conectar';
                    });
                } else {
                    audioPlayer.pause();
                    audioPlayer.src = ''; 
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    mainApp.classList.remove('playing-mode'); // Regresa los controles fijos al pausar
                    statusElement.innerHTML = '<i class="fas fa-pause-circle"></i> Pausado';
                    cancelAnimationFrame(animationId);
                    bars.forEach(bar => bar.style.height = '5px');
                    
                    if (ytPlayer && ytPlayer.pauseVideo) {
                        ytPlayer.pauseVideo();
                    }
                }
            }

            // Refrescar Streaming
            function refreshStream() {
                refreshBtn.classList.add('loading');
                audioPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                mainApp.classList.remove('playing-mode');
                statusElement.innerHTML = '<i class="fas fa-sync-alt"></i> Sincronizando...';
                
                if (ytPlayer && ytPlayer.stopVideo) {
                    ytPlayer.stopVideo();
                }
                
                setTimeout(() => {
                    togglePlayback();
                    refreshBtn.classList.remove('loading');
                }, 800);
            }

            // Eventos de interacción del usuario
            playBtn.addEventListener('click', togglePlayback);
            volumeSlider.addEventListener('input', () => audioPlayer.volume = volumeSlider.value);
            refreshBtn.addEventListener('click', refreshStream);
        });
    </script>
</body>
</html>
