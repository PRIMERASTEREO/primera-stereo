<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />    
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('fondo.png') no-repeat center center;
            background-size: 100% 100%;
            background-attachment: fixed;
            padding: 15px;
            text-align: center;
        }

        .refresh-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .header-section {
            z-index: 2;
            width: 100%;
            margin-top: 10px;
        }

        .main-logo {
            font-size: 22pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .sub-logo {
            font-size: 13pt;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-top: -2px;
        }

        /* CARD CENTRAL */
        .player-card {
            position: relative;
            overflow: hidden;
            z-index: 2;
            width: 100%;
            max-width: 340px;
            background: #14161a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9);
            margin: auto 0;
            height: 340px;
        }

        /* Capa de carátula principal */
        .album-art-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.4s ease;
        }

        /* Contenedor del video */
        .player-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            background: #000000;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        
        /* Modificadores de estado dinámicos gestionados por JS */
        .player-card.video-mode .player-video-bg {
            z-index: 4;
            opacity: 1;
        }
        .player-card.video-mode .album-art-bg {
            opacity: 0;
        }

        .player-video-bg iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(1.42); /* Compensación de aspecto para rellenar el marco */
            object-fit: cover;
        }

        /* CAPA HOVER MEJORADA: Visible parcialmente por defecto para mostrar controles */
        .hover-control {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4); /* Fondo más suave al inicio */
            transition: background 0.4s ease, opacity 0.4s ease;
        }

        /* Interacción del Hover completa */
        .player-card:hover .hover-control,
        .player-card:active .hover-control {
            background: rgba(0, 0, 0, 0.7);
        }

        /* Al cargar o en modo carátula, forzamos que los textos de fondo se oculten para no ensuciar el logo */
        .player-card.art-mode .station-title,
        .player-card.art-mode .station-subtitle,
        .player-card.art-mode .bars-container,
        .player-card.art-mode .volume-container {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Los elementos informativos se revelan limpiamente al pasar el cursor */
        .player-card:hover .station-title, .player-card:hover .station-subtitle,
        .player-card:hover .bars-container, .player-card:hover .volume-container,
        .player-card:active .station-title, .player-card:active .station-subtitle,
        .player-card:active .bars-container, .player-card:active .volume-container {
            opacity: 1;
            pointer-events: auto;
        }

        .station-title {
            font-size: 13pt;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 2px 6px rgba(0,0,0,1);
        }

        .station-subtitle {
            font-size: 10pt;
            color: #00d4ff;
            font-weight: 600;
            margin-top: -5px;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }

        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 35px;
            margin: 5px 0;
        }

        .bar {
            width: 4px;
            height: 5px;
            background-color: #00d4ff;
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        /* BOTÓN PLAY: Diseñado con alta prioridad visual */
        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff7b00, #ffae00);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(255, 123, 0, 0.6);
            color: white;
            font-size: 26px;
            transition: transform 0.2s ease, background 0.3s ease;
            z-index: 6;
            pointer-events: auto !important; /* Siempre clicable */
        }
        
        .play-btn:hover {
            transform: scale(1.1);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 85%;
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .volume-icon {
            color: #ffffff;
            font-size: 14px;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        .status-badge {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 10pt;
            font-weight: bold;
            color: #ffffff;
            z-index: 5;
            width: 100%;
            max-width: 340px;
            padding: 12px 15px;
            background: rgba(20, 22, 26, 0.95);
            border-radius: 12px;
            min-height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .status-badge span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 270px;
        }

        .footer-section {
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-title {
            font-size: 10pt;
            color: #ffffff;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .social-btn.facebook:hover { background: #1877f2; }
        .social-btn.instagram:hover { background: #e1306c; }
        .social-btn.tiktok:hover { background: #000000; }
        .social-btn.youtube:hover { background: #ff0000; }
        .social-btn.google-play:hover { background: #0d9114; }

        .copyright {
            font-size: 8pt;
            color: #ffffff;
            line-height: 1.3;
        }

        @media (max-height: 620px) {
            .player-card, .status-badge { max-width: 290px; }
            .player-card { height: 290px; }
            .main-logo { font-size: 18pt; }
            .play-btn { width: 55px; height: 55px; font-size: 20px; }
            .bars-container { height: 25px; }
        }
    </style>
</head>
<body>

    <button class="refresh-btn" id="refresh-btn" title="Refrescar streaming y actualizar metadatos">
        <i class="fas fa-sync-alt"></i>
    </button>

    <div class="app-container" id="main-app">
        <div class="header-section">
            <h1 class="main-logo">Primera Stereo</h1>
            <div class="sub-logo">Radio Video Online</div>
        </div>

        <div class="player-card art-mode" id="player-card">
            <div id="album-art-bg" class="album-art-bg"></div>
            <div id="player-video-bg" class="player-video-bg"></div>

            <div class="hover-control">
                <div class="station-title">PRIMERA STEREO</div>
                <div class="station-subtitle">RADIO VIDEO ONLINE</div>   

                <div class="bars-container" id="radio-visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>

                <button class="play-btn" id="play-btn">
                    <i class="fas fa-play"></i>
                </button>

                <div class="volume-container">
                    <span><i class="fas fa-volume-down volume-icon"></i></span>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-slider">
                    <span><i class="fas fa-volume-up volume-icon"></i></span>
                </div>
            </div>
        </div>

        <div class="status-badge" id="status">
            <i class="fas fa-broadcast-tower"></i> <span>Presiona Play para escuchar</span>
        </div>

        <div class="footer-section">
            <div class="social-title">Síguenos en nuestras redes sociales</div>
            <div class="social-icons">
                <a href="https://www.facebook.com/PrimeraStereoRadio" class="social-btn facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/Primera.Stereo/" class="social-btn instagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@primerastereo" class="social-btn tiktok" target="_blank"><i class="fab fa-tiktok text-dark"></i></a>
                <a href="https://www.youtube.com/@PrimeraStereo" class="social-btn youtube" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://www.appcreator24.com/app3819260-6rbmq8" class="social-btn google-play" target="_blank"><i class="fab fa-google-play"></i></a>
            </div>
            <div class="copyright">
                &copy; 2010 - 2026 PRIMERA STEREO<br>RADIO VIDEO ONLINE
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audioPlayer = new Audio();
            const playBtn = document.getElementById('play-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const statusElement = document.getElementById('status');
            const refreshBtn = document.getElementById('refresh-btn');
            const bars = document.querySelectorAll('#radio-visualizer .bar');
            const albumArtBg = document.getElementById('album-art-bg');
            const videoContainer = document.getElementById('player-video-bg');
            const playerCard = document.getElementById('player-card');
            
            const streamUrl = 'https://primerastereo.stream.laut.fm/primerastereo';
            const metadataApiUrl = 'https://api.laut.fm/station/primerastereo/current_song';
            const defaultLogoUrl = 'https://primera-stereo.netlify.app/11.png';
            
            let lastVideoQuery = "";
            let isPlaying = false;
            let metadataInterval = null;
            let animationId;
            
            audioPlayer.volume = volumeSlider.value;
            albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;

            async function getAlbumArt(track, artist) {
                try {
                    const query = `${artist} ${track}`;
                    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        let highResArt = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
                        albumArtBg.style.backgroundImage = `url('${highResArt}')`;
                        return true;
                    }
                } catch (e) {
                    console.error("Error carátula:", e);
                }
                albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;
                return false;
            }

            function processTrackMedia(track, artist) {
                const trackUpper = track.toUpperCase();
                const artistUpper = artist.toUpperCase();

                // Filtro para jingles o identificaciones de la estación
                if (trackUpper.includes("JINGLE") || trackUpper.includes("PRIMERA STEREO") || artistUpper.includes("PRIMERA STEREO")) {
                    playerCard.classList.remove('video-mode');
                    playerCard.classList.add('art-mode');
                    videoContainer.innerHTML = '';
                    albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;
                    lastVideoQuery = "STATION_IDLE_LOGO";
                    return;
                }

                getAlbumArt(track, artist);

                // Exclusión explícita de "lyrics" o "letra" para videoclips musicales oficiales
                let cleanTrack = track.replace(/\(.*?\)/g, "").replace(/\[.*?\]/g, "").trim();
                let cleanArtist = artist.trim();
                
                // Generamos un query limpio para la URL nativa de incrustación de YouTube
                const rawSearchQuery = `${cleanArtist} ${cleanTrack} official music video`;
                if (rawSearchQuery === lastVideoQuery) return;
                lastVideoQuery = rawSearchQuery;

                // Si la reproducción no está activa, mantenemos la interfaz en modo carátula limpia
                if (!isPlaying) {
                    playerCard.classList.remove('video-mode');
                    playerCard.classList.add('art-mode');
                    return;
                }

                // INYECCIÓN DE VIDEO DIRECTA POR URL COMPILADA SIN DEPENDER DE FETCH API KEYS
                // Cambiamos el modo de renderizado a "/embed/videoseries?listType=search&list=..."
                // Esto fuerza a la plataforma de YouTube a buscar e inicializar de forma nativa el clip musical al frente
                const embeddedSearchUrl = `https://www.youtube.com/embed/videoseries?listType=search&list=${encodeURIComponent(rawSearchQuery)}&autoplay=1&mute=1&controls=0&rel=0&loop=1&showinfo=0&iv_load_policy=3&playsinline=1`;
                
                videoContainer.innerHTML = `
                    <iframe 
                        src="${embeddedSearchUrl}" 
                        allow="autoplay; encrypted-media" 
                        frameborder="0">
                    </iframe>`;
                
                // Intercambio inmediato de capas por CSS
                playerCard.classList.remove('art-mode');
                playerCard.classList.add('video-mode');
            }
            
            async function updateMetadata() {
                try {
                    const response = await fetch(metadataApiUrl + '?t=' + new Date().getTime());
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    
                    if (data && data.title) {
                        const currentTrack = data.title;
                        const currentArtist = data.artist && data.artist.name ? data.artist.name : 'PRIMERA STEREO';
                        
                        statusElement.innerHTML = `<i class="fas fa-music"></i> <span>${currentArtist} - ${currentTrack}</span>`;
                        processTrackMedia(currentTrack, currentArtist);
                    } else {
                        if (isPlaying) {
                            statusElement.innerHTML = '<i class="fas fa-broadcast-tower"></i> <span>Al Aire - En Vivo</span>';
                        }
                    }
                } catch (error) {
                    console.error('Error cargando metadatos:', error);
                }
            }

            updateMetadata();
            metadataInterval = setInterval(updateMetadata, 14000);

            function simulateVisualizer() {
                if (!isPlaying) {
                    bars.forEach(bar => bar.style.height = '5px');
                    return;
                }
                bars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 27) + 5;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.background = 'linear-gradient(to top, #ff7b00, #ffae00)';
                });
                animationId = requestAnimationFrame(simulateVisualizer);
            }

            function togglePlayback() {
                if (!isPlaying) {
                    statusElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
                    audioPlayer.src = streamUrl + '?cb=' + Date.now();
                    audioPlayer.crossOrigin = "anonymous";
                    
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        playBtn.style.background = 'linear-gradient(135deg, #0072ff, #00d4ff)';
                        playBtn.style.boxShadow = '0 6px 20px rgba(0, 114, 255, 0.6)';
                        simulateVisualizer();
                        lastVideoQuery = ""; 
                        updateMetadata();
                    }).catch(error => {
                        console.error('Error en stream:', error);
                        statusElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error de streaming';
                    });
                } else {
                    audioPlayer.pause();
                    audioPlayer.src = ''; 
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    playBtn.style.background = 'linear-gradient(135deg, #ff7b00, #ffae00)';
                    playBtn.style.boxShadow = '0 6px 20px rgba(255, 123, 0, 0.6)';
                    statusElement.innerHTML = '<i class="fas fa-pause-circle"></i> Pausado';
                    cancelAnimationFrame(animationId);
                    bars.forEach(bar => bar.style.height = '5px');
                    playerCard.classList.remove('video-mode');
                    playerCard.classList.add('art-mode');
                    videoContainer.innerHTML = '';
                }
            }

            function refreshStream() {
                refreshBtn.classList.add('loading');
                audioPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                playBtn.style.background = 'linear-gradient(135deg, #ff7b00, #ffae00)';
                statusElement.innerHTML = '<i class="fas fa-sync-alt"></i> Sincronizando...';
                
                setTimeout(() => {
                    togglePlayback();
                    refreshBtn.classList.remove('loading');
                }, 600);
            }

            playBtn.addEventListener('click', togglePlayback);
            volumeSlider.addEventListener('input', () => audioPlayer.volume = volumeSlider.value);
            refreshBtn.addEventListener('click', refreshStream);
        });
    </script>
</body>
</html>
