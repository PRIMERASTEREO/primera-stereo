<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />    
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />

        <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100% !important; height: 100vh !important; overflow: hidden !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: #ffffff; -webkit-user-select: none; user-select: none; }
        .app-container { position: relative !important; width: 100% !important; height: 100vh !important; display: flex !important; flex-direction: column !important; justify-content: space-between !important; align-items: center !important; background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('fondo.png') no-repeat center center !important; background-size: cover !important; padding: 20px !important; text-align: center !important; }
        
        .header-section { z-index: 10; width: 100%; margin-top: 10px; }
        .main-logo { font-size: 22pt; font-weight: 900; text-transform: uppercase; background: linear-gradient(45deg, #ff7b00, #ffae00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-logo { font-size: 13pt; font-weight: bold; color: #00d4ff; margin-top: -2px; }
        
        .player-card { position: relative; overflow: hidden; z-index: 5; width: 100%; max-width: 440px; height: 440px; background: #14161a; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9); margin: auto 0 !important; }
        .album-art-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; background-size: cover; background-position: center; transition: opacity 0.4s ease; opacity: 1; }
        .player-video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #000000; opacity: 0; transition: opacity 0.4s ease; overflow: hidden; }
        .player-card.video-mode .player-video-bg { z-index: 7; opacity: 1; }
        .player-card.video-mode .album-art-bg { opacity: 0; }
        .player-video-bg iframe { width: 100% !important; height: 100% !important; border: none !important; transform: scale(1.35) !important; object-fit: cover !important; }
        
        /* Controles ocultos por defecto, solo visibles con hover */
        .hover-control { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; background: rgba(0, 0, 0, 0.75); transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .player-card:hover .hover-control { opacity: 1; pointer-events: auto; }
        
        .play-btn { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #0072ff, #00d4ff); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; transition: transform 0.2s ease; }
        .play-btn:hover { transform: scale(1.1); }
        .volume-container { display: flex; align-items: center; gap: 10px; width: 85%; background: rgba(0, 0, 0, 0.6); padding: 8px 14px; border-radius: 12px; }
        .volume-slider { flex: 1; -webkit-appearance: none; height: 5px; background: rgba(255, 255, 255, 0.3); border-radius: 3px; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #00d4ff; cursor: pointer; }
        
        .status-badge { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 440px; padding: 12px 15px; background: rgba(20, 22, 26, 0.95); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); margin: 10px 0; overflow: hidden; }
        .marquee-container { flex: 1; overflow: hidden; white-space: nowrap; }
        
        .footer-section { z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 5px; }
        .social-icons { display: flex; gap: 12px; }
        .social-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 16px; transition: all 0.3s ease; }
        .social-btn:hover { transform: translateY(-3px); }
        .facebook:hover { background: #1877f2; }
        .instagram:hover { background: #e1306c; }
        .tiktok:hover { background: #000000; }
        .youtube:hover { background: #ff0000; }
        .google-play:hover { background: #20e8c7; }
        .whatsapp:hover { background: #20e825; }
        .copyright { font-size: 8pt; color: #00d4ff; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-section">
            <h1 class="main-logo">Primera Stereo</h1>
            <div class="sub-logo">Radio Video Online</div>
        </div>

        <div class="player-card" id="player-card">
            <div id="album-art-bg" class="album-art-bg"></div>
            <div id="player-video-bg" class="player-video-bg"><div id="yt-player-element"></div></div>
            <div class="hover-control">
                <button class="play-btn" id="play-btn"><i class="fas fa-play"></i></button>
                <div class="volume-container">
                    <i class="fas fa-volume-down"></i>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-slider">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
        </div>

        <div class="status-badge">
            <i class="fas fa-broadcast-tower" id="status-icon"></i>
            <div class="marquee-container"><span id="status-text">Sincronizando señal...</span></div>
        </div>

        <div class="footer-section">
            <div class="social-icons">
                <a href="#" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-btn instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-btn tiktok"><i class="fab fa-tiktok"></i></a>
                <a href="#" class="social-btn youtube"><i class="fab fa-youtube"></i></a>
                <a href="#" class="social-btn google-play"><i class="fab fa-google-play"></i></a>
                <a href="#" class="social-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
            </div>
            <div class="copyright">&copy; 2010 - 2026 PRIMERA STEREO RADIO VIDEO ONLINE...</div>
        </div>
    </div>

    <script>
        const audio = new Audio('https://primerastereo.stream.laut.fm/primerastereo');
        const playBtn = document.getElementById('play-btn');
        let isPlaying = false;
        let ytPlayer = null;

        // Cargar YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = () => {
            ytPlayer = new YT.Player('yt-player-element', {
                playerVars: { 'autoplay': 0, 'controls': 0, 'mute': 1, 'loop': 1, 'playsinline': 1 },
                events: { 'onReady': () => { if(isPlaying) ytPlayer.playVideo(); } }
            });
        };

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                audio.play();
                if(ytPlayer) ytPlayer.playVideo();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            } else {
                audio.pause();
                if(ytPlayer) ytPlayer.pauseVideo();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            }
        });

        // Autoplay al cargar
        window.onload = () => {
            playBtn.click();
        };

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });
    </script>
</body>
</html>
