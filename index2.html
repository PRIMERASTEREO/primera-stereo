<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO VIDEO ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />    
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100% !important;
            height: 100vh !important;
            overflow: hidden !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        /* BLINDAJE ESTRUCTURAL CONTRA ESTILOS INYECTADOS EXTERNOS */
        .app-container {
            position: relative !important;
            width: 100% !important;
            height: 100vh !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            align-items: center !important;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('fondo.png') no-repeat center center !important;
            background-size: cover !important;
            background-attachment: fixed !important;
            padding: 20px !important;
            text-align: center !important;
            box-sizing: border-box !important;
        }

        .header-section {
            z-index: 2;
            width: 100%;
            margin-top: 10px;
        }

        .main-logo {
            font-size: 22pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .sub-logo {
            font-size: 13pt;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-top: -2px;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.9);
        }

        /* CONTENEDOR CENTRAL DE REPRODUCCIÓN (CUADRADO PERFECTO) */
        .player-card {
            position: relative;
            overflow: hidden;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: #14161a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9);
            margin: auto 0 !important; /* Mantiene la simetría y centrado vertical */
            height: 440px;
        }

        .album-art-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.4s ease;
        }

        .player-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            background: #000000;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        
        .player-card.video-mode .player-video-bg {
            z-index: 4;
            opacity: 1;
        }
        
        .player-card.video-mode .album-art-bg {
            opacity: 0;
        }

        .player-video-bg iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(1.78); /* Elimina bandas negras y estira de forma fluida */
            object-fit: cover;
        }

        .hover-control {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            transition: background 0.4s ease, opacity 0.4s ease;
        }

        .player-card.video-mode .hover-control {
            background: rgba(0, 0, 0, 0); 
            opacity: 0;
        }
        
        .player-card.video-mode:hover .hover-control,
        .player-card.video-mode:active .hover-control {
            background: rgba(0, 0, 0, 0.6);
            opacity: 1;
        }

        .player-card.art-mode .station-title,
        .player-card.art-mode .station-subtitle,
        .player-card.art-mode .bars-container,
        .player-card.art-mode .volume-container,
        .player-card.art-mode .play-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .player-card.art-mode:hover .hover-control,
        .player-card.art-mode:active .hover-control {
            background: rgba(0, 0, 0, 0.7);
        }

        .player-card.video-mode .bars-container {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .player-card:hover .station-title, .player-card:hover .station-subtitle,
        .player-card:hover .bars-container, .player-card:hover .volume-container, .player-card:hover .play-btn,
        .player-card:active .station-title, .player-card:active .station-subtitle,
        .player-card:active .bars-container, .player-card:active .volume-container, .player-card:active .play-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .station-title {
            font-size: 13pt;
            font-weight: bold;
            color: #fc7f03;
            letter-spacing: 1px;
            text-shadow: 0 2px 6px rgba(0,0,0,1);
        }

        .station-subtitle {
            font-size: 10pt;
            color: #00d4ff;
            font-weight: 600;
            margin-top: -5px;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }

        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 35px;
            margin: 5px 0;
        }

        .bar {
            width: 4px;
            height: 5px;
            background-color: #00d4ff;
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0072ff, #00d4ff);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
            color: white;
            font-size: 26px;
            transition: transform 0.2s ease, background 0.3s ease, opacity 0.3s ease;
            z-index: 6;
            pointer-events: auto !important;
        }
        
        .play-btn:hover {
            transform: scale(1.1);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 85%;
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .volume-icon {
            color: #ffffff;
            font-size: 14px;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        /* BARRA DE METADATOS INFERIOR CON MARQUESINA */
        .status-badge {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            font-size: 10pt;
            font-weight: bold;
            color: #ffffff;
            z-index: 5;
            width: 100%;
            max-width: 440px;
            padding: 12px 15px;
            background: rgba(20, 22, 26, 0.95);
            border-radius: 12px;
            min-height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 10px;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        .status-badge i {
            color: #ffffff !important;
        }

        .metadata-artist {
            color: #fc7f03;
        }

        .metadata-track {
            color: #00d4ff;
        }
        
        .marquee-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            height: 20px;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            position: absolute;
            animation: marqueeEffect 12s linear infinite;
        }

        @keyframes marqueeEffect {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .footer-section {
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .social-title {
            font-size: 10pt;
            color: #fc7f03;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .social-btn.facebook:hover { background: #1877f2; }
        .social-btn.instagram:hover { background: #e1306c; }
        .social-btn.tiktok:hover { background: #000000; }
        .social-btn.youtube:hover { background: #ff0000; }
        .social-btn.google-play:hover { background: #20e8c7; }
        .social-btn.whatsapp:hover { background: #20e825; }

        .copyright {
            font-size: 8pt;
            color: #00d4ff;
            line-height: 1.3;
        }

        /* RESPONSIVE MÓVIL Y COMPACTO */
        @media (max-height: 660px) or (max-width: 480px) {
            .player-card, .status-badge { max-width: 320px; }
            .player-card { height: 320px; }
            .main-logo { font-size: 18pt; }
            .play-btn { width: 55px; height: 55px; font-size: 20px; }
            .bars-container { height: 25px; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-app">
        <div class="header-section">
            <h1 class="main-logo">Primera Stereo</h1>
            <div class="sub-logo">Radio Video Online</div>
        </div>

        <div class="player-card art-mode" id="player-card">
            <div id="album-art-bg" class="album-art-bg"></div>
            <div id="player-video-bg" class="player-video-bg"></div>

            <div class="hover-control">
                <div class="station-title">PRIMERA STEREO</div>
                <div class="station-subtitle">RADIO VIDEO ONLINE</div>   

                <div class="bars-container" id="radio-visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>

                <button class="play-btn" id="play-btn">
                    <i class="fas fa-pause"></i>
                </button>

                <div class="volume-container">
                    <span><i class="fas fa-volume-down volume-icon"></i></span>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-slider">
                    <span><i class="fas fa-volume-up volume-icon"></i></span>
                </div>
            </div>
        </div>

        <div class="status-badge" id="status">
            <i class="fas fa-broadcast-tower"></i>
            <div class="marquee-container">
                <span class="marquee-text" id="status-text">Sincronizando señal en vivo...</span>
            </div>
        </div>

        <div class="footer-section">
            <div class="social-title">Síguenos en nuestras redes sociales</div>
            <div class="social-icons">
                <a href="https://www.facebook.com/PrimeraStereoRadio" class="social-btn facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/Primera.Stereo/" class="social-btn instagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@primerastereo" class="social-btn tiktok" target="_blank"><i class="fab fa-tiktok text-dark"></i></a>
                <a href="https://www.youtube.com/@PrimeraStereo" class="social-btn youtube" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://www.appcreator24.com/app3819260-6rbmq8" class="social-btn google-play" target="_blank"><i class="fab fa-google-play"></i></a>
                <a href="https://wa.link/lplcl8" class="social-btn whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
            <div class="copyright">
                &copy; 2010 - 2026 PRIMERA STEREO<br>RADIO VIDEO ONLINE
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audioPlayer = new Audio();
            const playBtn = document.getElementById('play-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const statusElement = document.getElementById('status');
            const bars = document.querySelectorAll('#radio-visualizer .bar');
            const albumArtBg = document.getElementById('album-art-bg');
            const videoContainer = document.getElementById('player-video-bg');
            const playerCard = document.getElementById('player-card');
            
            const streamUrl = 'https://primerastereo.stream.laut.fm/primerastereo';
            const metadataApiUrl = 'https://api.laut.fm/station/primerastereo/current_song';
            const defaultLogoUrl = 'https://primera-stereo.netlify.app/11.png'; 
            const YOUTUBE_API_KEY = "AIzaSyDtVkrxNt62ifQzOf_arUE6XwK6lAVZ4rs";
            
            let ytPlayer = null;
            let isPlayerReady = false; 
            let lastVideoQuery = "";
            let currentArtistGlobal = "";
            let currentTrackGlobal = "";
            
            let isPlaying = false;
            let metadataInterval = null;
            let animationId;
            
            audioPlayer.volume = volumeSlider.value;
            albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;

            // Cargar de forma asíncrona la API de iFrames de YouTube
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            window.onYouTubeIframeAPIReady = function() {
                ytPlayer = new YT.Player('player-video-bg', {
                    height: '100%',
                    width: '100%',
                    videoId: 'Jf3v7H7G-bU', 
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'rel': 0,
                        'loop': 1,
                        'mute': 1,
                        'playsinline': 1,
                        'disablekb': 1,
                        'origin': window.location.origin
                    },
                    events: {
                        'onReady': function(event) {
                            event.target.mute();
                            isPlayerReady = true;
                            if (currentTrackGlobal && currentArtistGlobal) {
                                searchAndPlayVideo(currentTrackGlobal, currentArtistGlobal);
                            }
                        },
                        'onStateChange': function(event) {
                            if (event.data === YT.PlayerState.PLAYING) {
                                playerCard.classList.remove('art-mode');
                                playerCard.classList.add('video-mode');
                            }
                        },
                        'onError': function(event) {
                            console.warn("Video no disponible. Restableciendo modo Carátula.");
                            fallbackToArtMode();
                        }
                    }
                });
            };

            // INTERCEPTOR JSONP PARA DESACTIVAR EL CONTROL DE CORS DE ITUNES DE FORMA NATIVA
            window.handleiTunesResponse = function(data) {
                if (data.results && data.results.length > 0) {
                    let highResArt = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
                    albumArtBg.style.backgroundImage = `url('${highResArt}')`;
                } else {
                    albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;
                }
                const oldScript = document.getElementById('itunes-jsonp');
                if (oldScript) oldScript.remove();
            };

            function getAlbumArt(track, artist) {
                const query = `${artist} ${track}`;
                const oldScript = document.getElementById('itunes-jsonp');
                if (oldScript) oldScript.remove();

                const script = document.createElement('script');
                script.id = 'itunes-jsonp';
                script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1&callback=handleiTunesResponse`;
                script.onerror = function() {
                    albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;
                };
                document.body.appendChild(script);
            }

            // SISTEMA INTELIGENTE CONTRA EL ERROR 429 BASADO EN CACHÉ DE NAVEGADOR (LOCALSTORAGE)
            async function searchAndPlayVideo(track, artist) {
                const trackUpper = track.toUpperCase();
                const artistUpper = artist.toUpperCase();

                if (trackUpper.includes("JINGLE") || trackUpper.includes("PRIMERA STEREO") || artistUpper.includes("PRIMERA STEREO")) {
                    clearVideoBuffer();
                    albumArtBg.style.backgroundImage = `url('${defaultLogoUrl}')`;
                    lastVideoQuery = "STATION_IDLE_LOGO";
                    return;
                }

                let cleanTrack = track.replace(/\(.*?\)/g, "").replace(/\[.*?\]/g, "").trim();
                let cleanArtist = artist.trim();
                
                const videoQuery = `${cleanArtist} ${cleanTrack}`; 
                
                currentArtistGlobal = cleanArtist;
                currentTrackGlobal = cleanTrack;

                getAlbumArt(cleanTrack, cleanArtist);

                if (!isPlayerReady || !ytPlayer || !ytPlayer.loadVideoById) return;
                if (videoQuery === lastVideoQuery) return;
                lastVideoQuery = videoQuery;

                // Verificar memoria del cliente local antes de consumir cuota de la API
                const cachedVideoId = localStorage.getItem(`yt_${videoQuery}`);
                if (cachedVideoId) {
                    if (cachedVideoId === "NOT_FOUND") {
                        fallbackToArtMode();
                    } else {
                        executeVideoLoad(cachedVideoId);
                    }
                    return; 
                }

                try {
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(videoQuery)}&type=video&videoEmbeddable=true&videoSyndicated=true&key=${YOUTUBE_API_KEY}`;
                    const response = await fetch(searchUrl);
                    
                    if (response.status === 429 || !response.ok) {
                        console.warn(`Cuota de API YouTube saturada (HTTP ${response.status}). Activando carátula estática.`);
                        fallbackToArtMode();
                        return;
                    }

                    const data = await response.json();

                    if (data.items && data.items.length > 0) {
                        const videoId = data.items[0].id.videoId;
                        localStorage.setItem(`yt_${videoQuery}`, videoId); // Almacena en el navegador de por vida
                        executeVideoLoad(videoId);
                    } else {
                        localStorage.setItem(`yt_${videoQuery}`, "NOT_FOUND");
                        fallbackToArtMode();
                    }
                } catch (error) {
                    console.error('Error procesando búsqueda de YouTube:', error);
                    fallbackToArtMode();
                }
            }

            function clearVideoBuffer() {
                 if (ytPlayer && ytPlayer.stopVideo) {
                     ytPlayer.stopVideo();
                 }
                 fallbackToArtMode();
            }

            function fallbackToArtMode() {
                 playerCard.classList.remove('video-mode');
                 playerCard.classList.add('art-mode');
            }

            function executeVideoLoad(videoId) {
                if (!isPlayerReady || !ytPlayer) return;
                try {
                    ytPlayer.loadVideoById({
                        videoId: videoId,
                        startSeconds: 0
                    });
                    ytPlayer.mute();
                    ytPlayer.playVideo();
                } catch (err) {
                    console.error("Error inyectando track:", err);
                    fallbackToArtMode();
                }
            }
            
            async function updateMetadata() {
                try {
                    const response = await fetch(metadataApiUrl + '?t=' + new Date().getTime());
                    if (!response.ok) throw new Error('Error de enlace');
                    const data = await response.json();
                    
                    const statusTextElement = document.getElementById('status-text');
                    
                    if (data && data.title) {
                        const currentTrack = data.title;
                        const currentArtist = data.artist && data.artist.name ? data.artist.name : 'PRIMERA STEREO';
                        
                        statusElement.querySelector('i').className = "fas fa-music";
                        statusTextElement.innerHTML = `<span class="metadata-artist">${currentArtist}</span> - <span class="metadata-track">${currentTrack}</span>`;
                        searchAndPlayVideo(currentTrack, currentArtist);
                    } else {
                        if (isPlaying) {
                            statusElement.querySelector('i').className = "fas fa-broadcast-tower";
                            statusTextElement.textContent = "Al Aire - En Vivo";
                        }
                    }
                } catch (error) {
                    console.error('Fallo en sincronización:', error);
                }
            }

            function simulateVisualizer() {
                if (!isPlaying) {
                    bars.forEach(bar => bar.style.height = '5px');
                    return;
                }
                bars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 27) + 5;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.background = 'linear-gradient(to top, #ff7b00, #ffae00)';
                });
                animationId = requestAnimationFrame(simulateVisualizer);
            }

            function autoPlayOnLoad() {
                audioPlayer.src = streamUrl + '?cb=' + Date.now();
                audioPlayer.crossOrigin = "anonymous";
                
                audioPlayer.play().then(() => {
                    isPlaying = true;
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    playBtn.style.background = 'linear-gradient(135deg, #0072ff, #00d4ff)';
                    playBtn.style.boxShadow = '0 6px 20px rgba(0, 114, 255, 0.6)';
                    simulateVisualizer();
                    updateMetadata();
                }).catch(error => {
                    console.warn('Interacción requerida por políticas del navegador.');
                    document.getElementById('status-text').textContent = "Presiona Pausa/Play para escuchar en vivo";
                    statusElement.querySelector('i').className = "fas fa-play-circle";
                    updateMetadata(); 
                });
            }

            function togglePlayback() {
                const statusTextElement = document.getElementById('status-text');
                if (!isPlaying) {
                    statusElement.querySelector('i').className = "fas fa-spinner fa-spin";
                    statusTextElement.textContent = "Conectando...";
                    audioPlayer.src = streamUrl + '?cb=' + Date.now();
                    audioPlayer.crossOrigin = "anonymous";
                    
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        playBtn.style.background = 'linear-gradient(135deg, #0072ff, #00d4ff)';
                        playBtn.style.boxShadow = '0 6px 20px rgba(0, 114, 255, 0.6)';
                        simulateVisualizer();
                        lastVideoQuery = ""; 
                        updateMetadata();
                    }).catch(error => {
                        console.error('Error de señal:', error);
                        statusElement.querySelector('i').className = "fas fa-exclamation-triangle";
                        statusTextElement.textContent = "Error de streaming";
                    });
                } else {
                    audioPlayer.pause();
                    audioPlayer.src = ''; 
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    playBtn.style.background = 'linear-gradient(135deg, #ff7b00, #ffae00)';
                    playBtn.style.boxShadow = '0 6px 20px rgba(255, 123, 0, 0.6)';
                    statusElement.querySelector('i').className = "fas fa-pause-circle";
                    statusTextElement.textContent = "Pausado";
                    cancelAnimationFrame(animationId);
                    bars.forEach(bar => bar.style.height = '5px');
                    clearVideoBuffer();
                }
            }

            autoPlayOnLoad();
            metadataInterval = setInterval(updateMetadata, 15000);
            
            playBtn.addEventListener('click', togglePlayback);
            volumeSlider.addEventListener('input', () => audioPlayer.volume = volumeSlider.value);
        });
    </script>
</body>
</html>
