<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />    
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('fondo.png') no-repeat center center;
            background-size: 100% 100%;
            background-attachment: fixed;
            padding: 15px;
            text-align: center;
        }

        .refresh-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .header-section {
            z-index: 2;
            width: 100%;
            margin-top: 10px;
        }

        .main-logo {
            font-size: 22pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .sub-logo {
            font-size: 13pt;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-top: -2px;
        }

        .player-card {
            position: relative;
            overflow: hidden;
            z-index: 2;
            width: 100%;
            max-width: 340px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: auto 0;
            min-height: 320px;
            justify-content: space-between;
        }

        /* CORRECCIÓN: Carátula NÍTIDA sin desenfoque (blur eliminado) */
        .album-art-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-size: cover;
            background-position: center;
            opacity: 0.85;
            transition: background-image 0.5s ease-in-out;
        }

        /* Capa de video flotando arriba de la carátula */
        .player-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; 
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        /* Clase activa para mostrar el video sólo si es totalmente válido */
        .player-video-bg.visible {
            opacity: 0.70;
        }

        .player-video-bg iframe {
            width: 100%;
            height: 100%;
            transform: scale(1.4);
            object-fit: cover;
            pointer-events: none;
        }

        /* Escudo transparente para proteger los controles táctiles del iframe */
        .video-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            background: transparent;
        }

        .hover-control {
            position: relative;
            z-index: 5;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .station-title {
            font-size: 11pt;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .station-subtitle {
            font-size: 9pt;
            color: #e2e8f0;
            margin-top: -5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 35px;
            margin: 5px 0;
        }

        .bar {
            width: 4px;
            height: 5px;
            background-color: #00d4ff;
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        .play-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0, 198, 255, 0.4);
            color: white;
            font-size: 24px;
            z-index: 6;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 85%;
            margin-top: 5px;
        }

        .volume-icon {
            color: #ffffff;
            font-size: 14px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.4);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
        }

        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 10pt;
            font-weight: bold;
            color: #ffffff;
            z-index: 6;
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            min-height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-top: 5px;
        }
        
        .status-badge span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .footer-section {
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-title {
            font-size: 10pt;
            color: #ffffff;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .social-btn.facebook:hover { background: #1877f2; }
        .social-btn.instagram:hover { background: #e1306c; }
        .social-btn.tiktok:hover { background: #000000; }
        .social-btn.youtube:hover { background: #ff0000; }
        .social-btn.google-play:hover { background: #0d9114; }

        .copyright {
            font-size: 8pt;
            color: #ffffff;
            line-height: 1.3;
        }

        @media (max-height: 580px) {
            .player-card { padding: 12px; gap: 8px; min-height: 260px; }
            .main-logo { font-size: 18pt; }
            .play-btn { width: 52px; height: 52px; font-size: 18px; }
            .bars-container { height: 25px; }
            .footer-section { gap: 6px; }
        }
    </style>
</head>
<body>

    <button class="refresh-btn" id="refresh-btn" title="Refrescar streaming y actualizar metadatos">
        <i class="fas fa-sync-alt"></i>
    </button>

    <div class="app-container" id="main-app">
        <div class="header-section">
            <h1 class="main-logo">Primera Stereo</h1>
            <div class="sub-logo">Radio Video Online</div>
        </div>

        <div class="player-card" id="radio-container">
            <div class="video-shield"></div>
            <div id="album-art-bg" class="album-art-bg"></div>
            <div id="player-video-bg" class="player-video-bg"></div>

            <div class="hover-control">
                <div class="station-title">PRIMERA STEREO</div>
                <div class="station-subtitle">RADIO VIDEO ONLINE</div>   

                <div class="bars-container" id="radio-visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>

                <button class="play-btn" id="play-btn">
                    <i class="fas fa-play"></i>
                </button>

                <div class="volume-container">
                    <span><i class="fas fa-volume-down volume-icon"></i></span>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-slider">
                    <span><i class="fas fa-volume-up volume-icon"></i></span>
                </div>
            </div>

            <div class="status-badge" id="status">
                <i class="fas fa-broadcast-tower"></i> <span>Presiona Play para escuchar</span>
            </div>
        </div>

        <div class="footer-section">
            <div class="social-title">Síguenos en nuestras redes sociales</div>
            <div class="social-icons">
                <a href="https://www.facebook.com/PrimeraStereoRadio" class="social-btn facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/Primera.Stereo/" class="social-btn instagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@primerastereo" class="social-btn tiktok" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.youtube.com/@PrimeraStereo" class="social-btn youtube" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://www.appcreator24.com/app3819260-6rbmq8" class="social-btn google-play" target="_blank"><i class="fab fa-google-play"></i></a>
            </div>
            <div class="copyright">
                &copy;2010 - 2026 PRIMERA STEREO<br>RADIO VIDEO ONLINE
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audioPlayer = new Audio();
            const playBtn = document.getElementById('play-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const statusElement = document.getElementById('status');
            const refreshBtn = document.getElementById('refresh-btn');
            const bars = document.querySelectorAll('#radio-visualizer .bar');
            const mainApp = document.getElementById('main-app');
            const albumArtBg = document.getElementById('album-art-bg');
            const videoContainer = document.getElementById('player-video-bg');
            
            const streamUrl = 'https://primerastereo.stream.laut.fm/primerastereo';
            const metadataApiUrl = 'https://api.laut.fm/station/primerastereo/current_song';
            
            const YOUTUBE_API_KEY = "AIzaSyCxU2onHMctFbLj0UKLt-SHjw8V80bmGgg";
            let ytPlayer = null;
            let isPlayerReady = false; 
            let lastVideoQuery = "";
            let currentArtistGlobal = "";
            let currentTrackGlobal = "";
            
            let isPlaying = false;
            let metadataInterval = null;
            let animationId;
            
            audioPlayer.volume = volumeSlider.value;
            
            // Carga asíncrona de la API Iframe de YouTube
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('player-video-bg', {
        height: '100%',
        width: '100%',
        videoId: 'Jf3v7H7G-bU', 
        playerVars: {
            'autoplay': 1,
            'controls': 0,
            'rel': 0,
            'loop': 1,
            'mute': 1, 
            'playsinline': 1,
            'disablekb': 1,
            'origin': window.location.origin
        },
        events: {
            'onReady': function(event) {
                event.target.mute();
                isPlayerReady = true;
                if (currentTrackGlobal && currentArtistGlobal) {
                    searchAndPlayVideo(currentTrackGlobal, currentArtistGlobal);
                }
            },
            'onStateChange': function(event) {
                if (event.data === YT.PlayerState.PLAYING) {
                    videoContainer.classList.add('visible'); 
                }
                if (event.data === YT.PlayerState.ENDED) {
                    ytPlayer.playVideo(); 
                }
            },
            'onError': function(event) {
                // Alerta de bloqueo por Copyright detectada: Escondemos el video roto al instante
                console.warn("Video bloqueado por derechos de autor o ID inválido. Pasando a carátula HD limpia.");
                videoContainer.classList.remove('visible');
                if(ytPlayer && ytPlayer.stopVideo) {
                    ytPlayer.stopVideo();
                }
            }
        }
    });
};

async function searchAndPlayVideo(track, artist) {
    // 1. Limpieza a fondo del texto eliminando remezclas repetitivas o paréntesis molestos
    let cleanTrack = track.replace(/\(.*?\)/g, "").replace(/\[.*?\]/g, "").trim();
    
    // 2. Filtro estratégico en el Query: Forzamos la búsqueda de pistas de audio plano o letras estables
    const query = `${artist} ${cleanTrack} audio static lyrics`; 
    
    currentArtistGlobal = artist;
    currentTrackGlobal = cleanTrack;

    // Actualizamos la carátula HD en paralelo al fondo
    getAlbumArt(cleanTrack, artist);

    if (!isPlayerReady || !ytPlayer || !ytPlayer.loadVideoById) return;
    if (query === lastVideoQuery) return;
    lastVideoQuery = query;

    try {
        // Buscamos entre los primeros 5 resultados un video apto
        const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&key=${YOUTUBE_API_KEY}`;
        const response = await fetch(searchUrl);
        const data = await response.json();

        if (data.items && data.items.length > 0) {
            // Tomamos el primer candidato seguro entregado por el filtro
            let selectedVideoId = data.items[0].id.videoId;
            executeVideoLoad(selectedVideoId);
        } else {
            videoContainer.classList.remove('visible');
        }
    } catch (error) {
        console.error('Error YouTube API:', error);
        videoContainer.classList.remove('visible');
    }
}

function executeVideoLoad(videoId) {
    if (!isPlayerReady || !ytPlayer) return;
    try {
        videoContainer.classList.remove('visible'); // Ocultar mientras engancha el buffer
        ytPlayer.loadVideoById({videoId: videoId});
        ytPlayer.mute();
        ytPlayer.playVideo();
    } catch (err) {
        console.error("Error cargando ID de video:", err);
        videoContainer.classList.remove('visible');
    }
}

            // iTunes API para traer arte limpio y en alta resolución
            async function getAlbumArt(track, artist) {
                try {
                    const query = `${artist} ${track}`;
                    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        let highResArt = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
                        albumArtBg.style.backgroundImage = `url('${highResArt}')`;
                    } else {
                        // Fondo por defecto elegante si iTunes no encuentra nada
                        albumArtBg.style.backgroundImage = "radial-gradient(circle, #1a1c23 0%, #0b0c10 100%)";
                    }
                } catch (e) {
                    console.error("Error carátula:", e);
                }
            }

            async function searchAndPlayVideo(track, artist) {
                // Limpieza de cadenas de caracteres extrañas
                let cleanTrack = track.replace(/\(.*?\)/g, "").replace(/\[.*?\]/g, "").trim();
                
                // MEJORA ESTRATÉGICA: Buscamos versiones "audio", "lyrics" o "cover" para saltar bloqueos de copyright
                const query = `${artist} ${cleanTrack} audio lyrics`; 
                
                currentArtistGlobal = artist;
                currentTrackGlobal = cleanTrack;

                // Actualizar carátula HD inmediatamente en paralelo
                getAlbumArt(cleanTrack, artist);

                if (!isPlayerReady || !ytPlayer || !ytPlayer.loadVideoById) return;
                if (query === lastVideoQuery) return;
                lastVideoQuery = query;

                try {
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=3&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&key=${YOUTUBE_API_KEY}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();

                    if (data.items && data.items.length > 0) {
                        let selectedVideoId = data.items[0].id.videoId;
                        executeVideoLoad(selectedVideoId);
                    } else {
                        videoContainer.classList.remove('visible');
                    }
                } catch (error) {
                    console.error('Error YouTube API:', error);
                    videoContainer.classList.remove('visible');
                }
            }

            function executeVideoLoad(videoId) {
                if (!isPlayerReady || !ytPlayer) return;
                try {
                    videoContainer.classList.remove('visible'); // Ocultamos durante la transición para que no parpadee gris
                    ytPlayer.loadVideoById({videoId: videoId});
                    ytPlayer.mute();
                    ytPlayer.playVideo();
                } catch (err) {
                    console.error("Error inyectando video:", err);
                    videoContainer.classList.remove('visible');
                }
            }
            
            async function updateMetadata() {
                try {
                    const response = await fetch(metadataApiUrl + '?t=' + new Date().getTime());
                    if (!response.ok) throw new Error('Error API');
                    const data = await response.json();
                    
                    if (data && data.title) {
                        const currentTrack = data.title;
                        const currentArtist = data.artist && data.artist.name ? data.artist.name : 'PRIMERA STEREO';
                        
                        statusElement.innerHTML = `<i class="fas fa-music"></i> <span>${currentArtist} - ${currentTrack}</span>`;
                        searchAndPlayVideo(currentTrack, currentArtist);
                    } else {
                        if (isPlaying) {
                            statusElement.innerHTML = '<i class="fas fa-broadcast-tower"></i> <span>Al Aire - En Vivo</span>';
                        }
                    }
                } catch (error) {
                    console.error('Error metadatos:', error);
                }
            }

            updateMetadata();
            metadataInterval = setInterval(updateMetadata, 15000);

            function simulateVisualizer() {
                if (!isPlaying) {
                    bars.forEach(bar => bar.style.height = '5px');
                    return;
                }
                bars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 27) + 5;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.background = 'linear-gradient(to top, #0072ff, #00d4ff)';
                });
                animationId = requestAnimationFrame(simulateVisualizer);
            }

            function togglePlayback() {
                if (!isPlaying) {
                    statusElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
                    audioPlayer.src = streamUrl + '?cb=' + Date.now();
                    audioPlayer.crossOrigin = "anonymous";
                    
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        simulateVisualizer();
                        lastVideoQuery = ""; 
                        updateMetadata();
                    }).catch(error => {
                        console.error('Error streaming:', error);
                        statusElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error de streaming';
                    });
                } else {
                    audioPlayer.pause();
                    audioPlayer.src = ''; 
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    statusElement.innerHTML = '<i class="fas fa-pause-circle"></i> Pausado';
                    cancelAnimationFrame(animationId);
                    bars.forEach(bar => bar.style.height = '5px');
                }
            }

            function refreshStream() {
                refreshBtn.classList.add('loading');
                audioPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                statusElement.innerHTML = '<i class="fas fa-sync-alt"></i> Sincronizando...';
                
                setTimeout(() => {
                    togglePlayback();
                    refreshBtn.classList.remove('loading');
                }, 600);
            }

            playBtn.addEventListener('click', togglePlayback);
            volumeSlider.addEventListener('input', () => audioPlayer.volume = volumeSlider.value);
            refreshBtn.addEventListener('click', refreshStream);
        });
    </script>
</body>
</html>
