<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIMERA STEREO 📻 RADIO ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="https://primerastereo.netlify.app/favicon.png">
    <link rel="icon" type="image/ico" href="https://primerastereo.netlify.app/favicon.png" sizes="512x512">
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="192x192" />
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="32x32" /> 
    <link rel="icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" sizes="16x16" />    
    <link rel="apple-touch-icon" href="https://primera-stereo.netlify.app/PSRO5-5.png" />

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('fondo.png') no-repeat center center;
            background-size: 100% 100%;
            background-attachment: fixed;
            padding: 15px;
            text-align: center;
        }

        .refresh-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .header-section {
            z-index: 2;
            width: 100%;
            margin-top: 10px;
        }

        .main-logo {
            font-size: 22pt;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .sub-logo {
            font-size: 13pt;
            font-weight: bold;
            color: #00d4ff;
            letter-spacing: 2px;
            margin-top: -2px;
        }

        .player-card {
            position: relative;
            overflow: hidden;
            z-index: 2;
            width: 100%;
            max-width: 340px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: auto 0;
            min-height: 290px;
            justify-content: space-between;
        }

        .player-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; 
            opacity: 0.6;
        }

        .player-video-bg iframe {
            width: 100%;
            height: 100%;
            transform: scale(1.4);
            object-fit: cover;
            pointer-events: none;
        }

        .video-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: transparent;
        }

        .hover-control {
            position: relative;
            z-index: 5;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .app-container.playing-mode .hover-control {
            opacity: 0;
        }

        .player-card:hover .hover-control {
            opacity: 1 !important;
        }

        .station-title {
            font-size: 11pt;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .station-subtitle {
            font-size: 9pt;
            color: #a0aec0;
            margin-top: -5px;
        }

        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 35px;
            margin: 5px 0;
        }

        .bar {
            width: 4px;
            height: 5px;
            background-color: #2563eb;
            border-radius: 2px;
            transition: height 0.2s ease;
        }

        .play-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 15px rgba(0, 198, 255, 0.4);
            color: white;
            font-size: 24px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 85%;
            margin-top: 5px;
        }

        .volume-icon {
            color: #b0b3b8;
            font-size: 14px;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
        }

        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 10pt;
            font-weight: bold;
            color: #ffffff;
            z-index: 6;
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            min-height: 44px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 5px;
        }
        
        .status-badge span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .footer-section {
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .social-title {
            font-size: 10pt;
            color: #ffffff;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .social-btn.facebook:hover { background: #1877f2; }
        .social-btn.instagram:hover { background: #e1306c; }
        .social-btn.tiktok:hover { background: #000000; }
        .social-btn.youtube:hover { background: #ff0000; }
        .social-btn.google-play:hover { background: #0d9114; }

        .copyright {
            font-size: 8pt;
            color: #ffffff;
            line-height: 1.3;
        }

        @media (max-height: 580px) {
            .player-card { padding: 12px; gap: 8px; min-height: 240px; }
            .main-logo { font-size: 18pt; }
            .play-btn { width: 52px; height: 52px; font-size: 18px; }
            .bars-container { height: 25px; }
            .footer-section { gap: 6px; }
        }
    </style>
</head>
<body>

    <button class="refresh-btn" id="refresh-btn" title="Refrescar streaming y actualizar metadatos">
        <i class="fas fa-sync-alt"></i>
    </button>

    <div class="app-container" id="main-app">
        <div class="header-section">
            <h1 class="main-logo">Primera Stereo</h1>
            <div class="sub-logo">Radio Video Online</div>
        </div>

        <div class="player-card" id="radio-container">
            <div class="video-shield"></div>
            <div id="player-video-bg" class="player-video-bg"></div>

            <div class="hover-control">
                <div class="station-title">PRIMERA STEREO</div>
                <div class="station-subtitle">RADIO VIDEO ONLINE</div>   

                <div class="bars-container" id="radio-visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>

                <button class="play-btn" id="play-btn">
                    <i class="fas fa-play"></i>
                </button>

                <div class="volume-container">
                    <span><i class="fas fa-volume-down volume-icon"></i></span>
                    <input type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" id="volume-slider">
                    <span><i class="fas fa-volume-up volume-icon"></i></span>
                </div>
            </div>

            <div class="status-badge" id="status">
                <i class="fas fa-broadcast-tower"></i> <span>Presiona Play para escuchar</span>
            </div>
        </div>

        <div class="footer-section">
            <div class="social-title">Síguenos en nuestras redes sociales</div>
            <div class="social-icons">
                <a href="https://www.facebook.com/PrimeraStereoRadio" class="social-btn facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/Primera.Stereo/" class="social-btn instagram" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@primerastereo" class="social-btn tiktok" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.youtube.com/@PrimeraStereo" class="social-btn youtube" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://www.appcreator24.com/app3819260-6rbmq8" class="social-btn google-play" target="_blank"><i class="fab fa-google-play"></i></a>
            </div>
            <div class="copyright">
                &copy;2010 - 2026 PRIMERA STEREO<br>RADIO VIDEO ONLINE
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audioPlayer = new Audio();
            const playBtn = document.getElementById('play-btn');
            const volumeSlider = document.getElementById('volume-slider');
            const statusElement = document.getElementById('status');
            const refreshBtn = document.getElementById('refresh-btn');
            const bars = document.querySelectorAll('#radio-visualizer .bar');
            const mainApp = document.getElementById('main-app');
            
            const streamUrl = 'https://primerastereo.stream.laut.fm/primerastereo';
            const metadataApiUrl = 'https://api.laut.fm/station/primerastereo/current_song';
            
            const YOUTUBE_API_KEY = "AIzaSyB587PR4Xec8bS3VpFu7si5lYZwYweyijQ";
            let ytPlayer = null;
            let isPlayerReady = false; 
            let lastVideoQuery = "";
            let currentArtistGlobal = "";
            let currentTrackGlobal = "";
            let fallbackAttempts = 0;
            
            let isPlaying = false;
            let metadataInterval = null;
            let animationId;
            
            audioPlayer.volume = volumeSlider.value;
            
            // Inyección asíncrona estándar del script de YouTube
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            // INICIALIZACIÓN CONTROLADA: Cargamos un video base estable de YouTube (un video de olas o similar totalmente libre de copyright agresivo)
            // Esto evita las pantallas grises iniciales y fallas de ID de reproducción tras un F5.
            window.onYouTubeIframeAPIReady = function() {
                ytPlayer = new YT.Player('player-video-bg', {
                    height: '100%',
                    width: '100%',
                    videoId: 'Jf3v7H7G-bU', // Video inicial dummy y súper estable para preparar el reproductor
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0,
                        'rel': 0,
                        'loop': 1,
                        'mute': 1, 
                        'playsinline': 1,
                        'disablekb': 1
                    },
                    events: {
                        'onReady': function(event) {
                            event.target.mute();
                            isPlayerReady = true; 
                            
                            // Si los metadatos se cargaron primero en Netlify, procesamos la canción real ahora mismo
                            if (currentTrackGlobal && currentArtistGlobal) {
                                searchAndPlayVideo(currentTrackGlobal, currentArtistGlobal);
                            }
                        },
                        'onStateChange': function(event) {
                            if (event.data === YT.PlayerState.ENDED && isPlaying) {
                                ytPlayer.playVideo(); 
                            }
                        },
                        'onError': function(event) {
                            console.warn("Fallo detectado. Saltando a búsqueda secundaria...");
                            fallbackSearch();
                        }
                    }
                });
            };

            async function searchAndPlayVideo(track, artist) {
                let cleanTrack = track.replace(/\(.*?\)/g, "").replace(/\[.*?\]/g, "").trim();
                const query = `${artist} ${cleanTrack} live tv festival`; 
                
                currentArtistGlobal = artist;
                currentTrackGlobal = cleanTrack;

                // Retener datos si el reproductor no está inicializado
                if (!isPlayerReady || !ytPlayer || !ytPlayer.loadVideoById) return;
                
                // Si el tema es el mismo, no hacemos nada para evitar saltos bruscos
                if (query === lastVideoQuery) return;
                
                lastVideoQuery = query;
                fallbackAttempts = 0; 

                try {
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&key=${YOUTUBE_API_KEY}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();

                    if (data.items && data.items.length > 0) {
                        filterAndLoadVideo(data.items);
                    } else {
                        fallbackSearch();
                    }
                } catch (error) {
                    console.error('Error en búsqueda principal:', error);
                    fallbackSearch();
                }
            }

            function filterAndLoadVideo(items) {
                let selectedVideoId = null;
                
                for (let item of items) {
                    let titleLower = item.snippet.title.toLowerCase();
                    if (!titleLower.includes('lyric') && !titleLower.includes('letras') && !titleLower.includes('subtitulado') && !titleLower.includes('subtitle')) {
                        selectedVideoId = item.id.videoId;
                        break;
                    }
                }
                
                if (!selectedVideoId && items.length > 0) {
                    selectedVideoId = items[0].id.videoId;
                }

                if (selectedVideoId) {
                    executeVideoLoad(selectedVideoId);
                }
            }

            async function fallbackSearch() {
                if (fallbackAttempts >= 2) return;
                fallbackAttempts++;

                try {
                    const queryAlternative = `${currentArtistGlobal} ${currentTrackGlobal} en vivo concierto`;
                    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=3&q=${encodeURIComponent(queryAlternative)}&type=video&videoEmbeddable=true&key=${YOUTUBE_API_KEY}`;
                    const response = await fetch(searchUrl);
                    const data = await response.json();

                    if (data.items && data.items.length > 0) {
                        filterAndLoadVideo(data.items);
                    }
                } catch (err) {
                    console.error('Error en fallback:', err);
                }
            }

            function executeVideoLoad(videoId) {
                if (!isPlayerReady || !ytPlayer) return;
                try {
                    // Si la radio está encendida, forzamos la reproducción en caliente
                    if (isPlaying) {
                        ytPlayer.loadVideoById({videoId: videoId});
                        ytPlayer.mute();
                        ytPlayer.playVideo();
                    } else {
                        // Si está pausada o cargando de cero, dejamos el video en espera
                        ytPlayer.cueVideoById({videoId: videoId});
                    }
                } catch (err) {
                    console.error("Error inyectando ID seguro:", err);
                }
            }
            
            async function updateMetadata() {
                try {
                    const response = await fetch(metadataApiUrl + '?t=' + new Date().getTime());
                    if (!response.ok) throw new Error('Error API');
                    const data = await response.json();
                    
                    if (data && data.title) {
                        const currentTrack = data.title;
                        const currentArtist = data.artist && data.artist.name ? data.artist.name : 'PRIMERA STEREO';
                        
                        statusElement.innerHTML = `<i class="fas fa-music"></i> <span>${currentArtist} - ${currentTrack}</span>`;
                        searchAndPlayVideo(currentTrack, currentArtist);
                    } else {
                        if (isPlaying) {
                            statusElement.innerHTML = '<i class="fas fa-broadcast-tower"></i> <span>Al Aire - En Vivo</span>';
                        }
                    }
                } catch (error) {
                    console.error('Error metadatos:', error);
                }
            }

            updateMetadata();
            metadataInterval = setInterval(updateMetadata, 15000);

            function simulateVisualizer() {
                if (!isPlaying) {
                    bars.forEach(bar => bar.style.height = '5px');
                    return;
                }
                bars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 27) + 5;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.background = 'linear-gradient(to top, #2563eb, #00d4ff)';
                });
                animationId = requestAnimationFrame(simulateVisualizer);
            }

            function togglePlayback() {
                if (!isPlaying) {
                    statusElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
                    audioPlayer.src = streamUrl + '?cb=' + Date.now();
                    audioPlayer.crossOrigin = "anonymous";
                    
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        mainApp.classList.add('playing-mode');
                        simulateVisualizer();
                        
                        // Forzamos actualización limpia de metadatos al arrancar
                        lastVideoQuery = ""; 
                        updateMetadata();
                        
                        if (isPlayerReady && ytPlayer && ytPlayer.playVideo) {
                            ytPlayer.playVideo();
                        }
                    }).catch(error => {
                        console.error('Error al reproducir:', error);
                        statusElement.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error de streaming';
                    });
                } else {
                    audioPlayer.pause();
                    audioPlayer.src = ''; 
                    isPlaying = false;
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                    mainApp.classList.remove('playing-mode');
                    statusElement.innerHTML = '<i class="fas fa-pause-circle"></i> Pausado';
                    cancelAnimationFrame(animationId);
                    bars.forEach(bar => bar.style.height = '5px');
                    
                    if (isPlayerReady && ytPlayer && ytPlayer.pauseVideo) {
                        ytPlayer.pauseVideo();
                    }
                }
            }

            function refreshStream() {
                refreshBtn.classList.add('loading');
                audioPlayer.pause();
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                mainApp.classList.remove('playing-mode');
                statusElement.innerHTML = '<i class="fas fa-sync-alt"></i> Sincronizando...';
                
                if (isPlayerReady && ytPlayer && ytPlayer.stopVideo) {
                    ytPlayer.stopVideo();
                }
                
                setTimeout(() => {
                    togglePlayback();
                    refreshBtn.classList.remove('loading');
                }, 800);
            }

            playBtn.addEventListener('click', togglePlayback);
            volumeSlider.addEventListener('input', () => audioPlayer.volume = volumeSlider.value);
            refreshBtn.addEventListener('click', refreshStream);
        });
    </script>
</body>
</html>
